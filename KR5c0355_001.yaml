front:
  text: 終南山祖庭仙真內傳卷上川二
  hash: sha256:a64be22b81020823d65e7658374e1450831cb70fe8cef3a51206230abaf53a94
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0355_HFL_001-001a, image: hfl/0604/0604-064.png}
body:
  text: 夷山天樂道人李道謙編玉蟾真人師姓和氏名德墐秦州甘泉縣人天姿整秀志學之歲攻事翰墨及冠隱身為刀筆吏然處事中正以道存心未嘗取非義財遇高人勝士靡不參請天德間以部椽出身方將遊仕宦途忽一道者過門師延至家酌酒談玄大適其意少焉而去他日道者復至臂擎一梟謂師曰此物雖許大眼了不識人師乃悟為異人因問其鄉里姓字不告而往後月餘道者復來身染厲疾止於其家膿血汗穢殆不可近師為召醫百療不效經歲乃殂師備禮葬之又數月一老媪詣門泣且告曰老身有兒性嗜雲水不事家業近知遊居貴宅特來相尋師告以病殂媪慟哭不已曰老身與兒止是二曰兒今既死何所託身師請以母禮事之一日媪曰吾欲啓壙一睹兒面雖死無憾懇告再四師為發冢但空棺而已中有祕㫖一幅老媪亦失所在師嘆曰吾今遇真仙尚汩沒塵坌中果何為也由是黜妻棄子易衣入道時聞重陽祖師亦遇真居終南乃往參同大定三年於劉蔣村結茅與靈陽李公三人同處既而心地圓通大得其妙七年丁亥重陽東遊海上師與靈陽共居暢道十年庚寅春馬談劉丘四真將至師及李靈陽時寓終南太平宫留錢於貨羹之家謂曰今日當有丘劉談馬四仙客至可善待之良久四人果至貨羹人邀之曰公輩豈非丘劉談馬邪四人相視而笑曰汝何由知之曰和李二師已留羹錢矣四子嘆異食畢往見欣然相得師嘗命畫工寫頁憑虎而睡衆莫能曉秋九月初師忽覺道體違和丹陽命長春侍疾至十四日翛然順化四子葬于劉蔣菴側畫憑虎腄者乃預表歸期在寅年也升仙之後有臨潼張公久患風疾衆醫莫效將屬纊之際夢師至門告以治療之方問其姓名曰吾終南和玉蟾也覺而其疾少愈用其所告之劑疾果頓差張就菴設齊建亭以酬其惠諡曰玉蟾普明澄寂真人今祖庭石刻尚在靈陽真人師姓李氏京兆終南縣人聰明特達學問淹該天德間遇異人點化自是落魄不問家事視富貴若浮雲遠名利如桎梏徜徉泉石以道自樂韜光晦迹素厭人知故終身不告人名字里人但以李真人呼之至大定三年與重陽祖師洎玉蟾和公同結茅于劉蔣居之其於鉛汞龍虎之學多賴重陽指授七年丁亥夏重陽東遊海上師與和公止居劉蔣修身接物重陽至汴寄之以詩云傳語和公與李公首先一志三人同其為交契可知矣逮十年春重陽升仙于汴梁丘劉談馬四真入關待二師以叔禮是年秋玉蟾亦假化師與衆真同處二十八年春正月長春丘君奉詔赴闕拜别之際師囑曰重陽謂汝必能大開玄教今其時矣萬一善自保愛來春鶴馭早還吾專俟汝為喪主秋八月長春得㫖還終南是冬盤桓山陽准洛之間明年春二月西歸過鄠郊秦渡鎮道衆請留數日先旬日前師無恙絶粒不食衆問之曰汝輩無慮吾惟待喪主而已即遣人促長春亟歸既至拜於榻前即賜之墨長春悟其㫖命匠造棺未及成師已順化時三月初一日也長春以禮葬于菴側之仙塋敬諡曰靈陽輝耀演化真人劉通微先生姓劉氏諱通微字恱道默然子道號也東萊掖城人世為鄉里右族倜儻不羈在弱冠間飛鷹走大博奕鬭雞迷於花酒之場一旦染奇疾幾至不救夢入仙家之境已而平復遂悟幻化之理以道存心大定丁亥夏重陽祖師將遊海上道過掖城見先生神清爽邁有飛舉雲霄之態與之同話機緣契合授以修頁祕㫖及今名號先生既得印可即棄家長往杖策入關中結茅于終南山甘谷之側吟風嘯月枕石漱流放懷塵世之外庚寅春丘劉談馬四師西來先生相得甚歡同葺劉蔣菴居之既而四師復詣汴梁負祖師仙蛻歸葬於菴側先生廬墓三年北遊嵐管內全道妙外應世緣摳衣請教者日不虛席於是立觀度人玄風大振於西山矣嘉聲遠播名達皇都明昌初道陵召至闕下問以九還七返之事先生曰此山林野人所尚陛下居九五之位四海生民之主不必留意於此但對以黃老清靜無為修身治國之要上悅敕館于天長觀尋遷永壽道院開堂演道三教九流請益問話者户外屨滿未幾得㫖還山賜御書以寵其行翱翔於齊魯間至埭州商河縣聶家莊謂門人曰此吾歸休之所也因葺治廬舍居之一日焚香禮聖集衆囑以修頁之語曰師頁有閬風之召吾當歸矣奄然假化即承安元年二月十五日貞元節也平生所作詩詞目曰全道集行于世仙化之所今大建朝元宫矣史處厚先生家世乾州醴泉姓史氏名公密初自垂髫心慕至道大定壬午歲聞重陽祖師遇仙受祕訣養道於終南時走而請盟遂蒙允納教以全頁性命之學仍訓名處厚號洞陽子自是乞食鍊心往來於終南鄠社間七年丁亥春重陽將游東海欲令侍行先生辭以母老不敢遠游重陽遂畫三髻道者立於雲中傍有一松一鶴付之曰謹祕藏之此為他日參同之符及庚寅春重陽仙化於汴梁丹陽宗師率三友入關至長安孔仙菴先生徑往參謁時丹陽初頂三髻先生出示重陽向日所留畫圖大為讚異四師告以海上開化汴梁升仙之事遞相印可相得甚歡即與四師同葺劉蔣菴居之丹陽屢以詩詞訓告次第誘掖不數載間克臻大妙後復還醴泉和光玩世不拘禮法時人以史風子呼之忽歌舞於市唯云歸去蓬莊衆俗莫曉如是者三日徑來菴中奄然蟬蛻時甲午六月十五日也官僚士庶靡不膽拜初葬醴泉明年丹陽移葬於劉蔣之仙塋開棺視之顔采如生丹陽以四言讚之云史公得遇得遇重陽重陽傳授傳授玄黃玄黃至理至埋不忘內持修鍊外絶炎凉水火既濟日月交光龍吟離位虎嘯坎房木金間隔姹女圓方刀圭爛飲知味聞香神丹結正晃耀晶陽風仙來度顯出嘉祥歌舞三日辭别街坊惟云歸去趨赴蓬莊復入菴內奄然坐亡觀者雲集事埋匪常一靈真性班列仙行先生道業讀此讚文自可見矣享年七十有三中統癸亥再遷仙塋開壙視之僅及百年骨雖散亂其色如金其堅若石余所親見者也異哉嚴處常先生姓嚴氏名處常號長清子京兆櫟陽縣人即重陽祖師之外戚幼習儒志尚清虛以父母在堂未能高蹈物表為縣法司臨事慈愍一日向暮還家路拾遺書一卷題曰玉靈聖書得之者仙于是焚香祝曰我今二十有九誓於不惑之年潔身入道祝畢酹酒於醮盆中有聲隱隱若雷家人咸以為異後踰一紀二親俱喪忽患目疾治之愈甚默自責曰昔得聖書誓以四十出家今過期矣此疾稍痊即當從道無何目明如故遂往終南劉蔣參重陽祖師願受教為門弟子時大定癸未歲也先生既蒙允納克志于道數年祖師授以微㫖七年丁亥夏祖師東遊先生遨遊終南泉石住處頤神育浩十年春丘劉談馬四師入關蒙丹陽宗師復為印可仍贈之楊柳枝詞云一虎一龍一處眠打盤旋一呼一吸一周天遍三田一麥一麻通一線裊祥煙一來一往一還元産胎仙先生拜受自是了無疑障居祖庭又逾十載道契真常以二十三年癸卯夏四月八日焚香辭衆無疾而逝春秋七十三矣姚玹先生姓姚氏諱玹號雲陽子終南蔣夏村人世為鄉里巨族父祖俱好賑贍貧乏多積陰德乃生先生丰神灑落超然挺出塵之姿性甚仁慈聞人有急必往援救與重陽祖師有緦麻之親大定丁亥四月重陽詣門告别先生問將安往重陽告欲遊海上丘劉談中捉馬之行先生素以害風相待笑而别無何重陽自汴京為先生寄藏頭拆字詩一章云前相識二官人你真靈看好因抵芝苗公未識成道果次須屯蒙卦聚神來祐左源通氣轉新斧若磨交利快頭一點遇長春不數年丹陽輩來居劉蔣菴先生所居相去數里聞之往詢其始末見丘劉談馬四師皆凌雲仙客愕然歎曰向重陽告别之語今果驗矣我輩常以害風待何愚之甚邪由斯頓悟乃棄家捐纍乞受道于丹陽宗師丹陽教以修真奧㫖及賜今名號仍贈之詩云灰心忘富貴槁體樂清貧甘作逍遙客長為自在人氣中須養氣神內更頤神不著纖毫假方能得至真恭侍左右多所傳授先生得法之後目不交睫脅不占席十有餘年深入大妙壬寅丹陽東歸寧海先生從行逮丹陽上仙先生遊歷磁相間愛滏陽風俗淳厚築白雲菴居之隨機接物演化度人一日謂衆言曰師真有命吾其歸乎於是沐浴更衣跏趺而坐日方卓午寂爾返真異香芬馥移時而散享年七十二平生所述詩詞號破迷集行於世曹瑱先生姓曹諱瑱道號朝虛子陜右坊州人家世巨富猶子徽美叔早登甲第先生少讀書鄉里以孝悌稱為人忠厚謙和襟懷蕭爽壯歲遊場屋間屢中高選大定甲午暇日因覽仙經道典掩卷歎曰人生浮世光陰電回倏然而已不究生前妙本出世高標果何為哉雖有學仙之志罔知所適聞丹陽宗師於終南祖庭居環堵先生徑往參謁一見神合氣協若有夙習之契丹陽納諸門下教以道要先生既蒙接引心知至人不易遇也遂捐進取心以永依歸丹陽知先生逸氣超邁妙識高明一日因先生靜室澄坐思造乎靜丹陽詣之曰學進歟先生稽首而跪乎前曰學欲進而未之能也丹陽曰夫靜也者天命之原仙聖之本習而進之猶假翰以登天反思而究則如坐堂上而睹階前也不曰靜乎攖而不煩不曰真乎作而不妄先生拜而謝曰瑱得之矣自信而不疑自明而不昧自古自今繩繩而不絶者其斯之謂歟丹陽乃首肯瑱再拜而退後得玄門十解元者自先生始也凡初入道者丹陽以先生為兄壬寅丹陽東歸寧海先生侍行明年丹陽羽化先生代師行化海上明昌中與雲中蘇公無染柳公奉長春師叔命同飛舄燕薊演化度人應緣接物十有餘年玄化大行於泰和丁卯夏四月先生時寓燕都城東永壽觀忽告衆曰吾當歸矣不數日示微疾而逝道衆具禮葬之觀東兵後乙巳冬改葬于五華山庚戌歲十二月奉朝命追贈翊玄惠正朝虛真人號蓋掌教真常真人請之也來靈玉先生世為京兆右族姓來氏諱靈玉道號真陽子幼習儒業鄉里以解元呼之大定十年間禮丹陽宗師出家逮丹陽東歸海上先生侍行嗣後事跡無所可考姑略紀其大槩他日得之當為詳録雷大通先生姓雷氏名大通道號洪陽子世為延安敷政之巨族身長六尺情懷雅淡不事小節眉疏目秀耳大準直脣如渥丹鬚髯美細幼業儒素嘗以詞賦魁鄉選故時人以解元稱之當大定乙未春方夜讀書燈下月朗風清欲竟三鼓忽聞窗外以杖畫地聲既而言曰可歎愚迷謾用功浮華一夢轉頭空何如立志修仙舉永住三山最上宫先生劇啓户出觀了無所見秉燭視之見以杖畫向詩四句後畫嵒翁二字先生自是了悟空華頓悱學仙之志是歲秋因赴試長安聞終南祖庭有丹陽宗師闡全真教法即往謁之一見若有夙契乃作詩二絶寫懷以呈宗師即繼韻答之云饒君聲價勝蘇秦不似韜光更匿名物外逍遙真坦蕩亘初一點自然明靜清便是長生訣捨棄妻男沒口傳悟後知空寧著有自然獲得好因緣先生焚香拜請願執弟子禮宗師留於座下訓以今之名號朝叩夕請於道大有所得壬寅夏丹陽東歸先生留居祖庭日進道業甲辰春聞丹陽上仙杖屨游海上奠祭墳壠逮明昌初迤邐西來道過滕郡愛嶧山巖壑幽邃築修真菴於響石澗棲真養浩演化度人厥後詣門受教為門弟子者數百人惟靈真子馬了道清明子王志專為入室今各建方所引接後進至大安辛未秋先生謂門人曰百六數窮劫灾斯至生靈魚肉吾不忍處世也無幾何示微疾而逝門人葬于修真菴側未幾兵甲擾攘烽煙澒洞後至大元撫定人煙稍集歲庚戌先生之高弟清虛真人張志洞至自武川睹先生宅兆卑隘封樹草略即會四方法屬備衣衾石槨大行改葬於雪山仙塋靈都宫以弟子馬靈真王清明祔于左右仍搆堂設像以事香火劉真一先生姓劉氏諱真一道號朗然子世為登州黃縣之巨室父祖以儒學起家積德奉道鄉里所稱先生幼喪其父讀書日記數千言辭源浩瀚弱冠間試藝春官得占高甲時人以解元呼之然每以世事為不足玩常有凌雲邁往之志忽得泄瀉之疾纏滯彌年已及膏肓百療不效大定己丑秋重陽祖師挈丹陽長真長春三真過其門母氏設齊供養之且以子疾告祖師視之曰此吾門大士非汝家子也許之入道則可矣母氏焚香跪於前曰此疾果愈俾侍几杖以從祖師以餘飲與之既飲汗出如洗厥疾漸瘳逮明年祖師已升仙於汴梁先生入關詣終南劉蔣村禮丹陽宗師出家奉侍既久得付玄㫖壬寅夏從丹陽東歸癸卯冬丹陽將羽化召先生囑之曰汝等要作神仙須要積功纍行縱遇千魔萬難慎勿退墮然後可領吾言我開眼也見瞑目也見元來不在眼但心中了然則無所不見矣又曰汝緣在北方可往矣先生拜而謝丹陽既升仙迤邐北游平灤之境所至請益者户外屨滿一日至撫寧縣愛其山水佳勝築重陽觀居之厥後度門衆數千餘輩創宫觀大小僅三百區北方道風洪暢先生闡揚之力居多至泰和丙寅歲二月初六日召入室弟子邸道明等曰吾其歸矣昔丹陽將升仙囑豫進道之語汝輩當無忘金玉集凡入道者不可不觀為我鏤梓散于多方可也須臾翛然假化平昔所作歌詩目曰應緣集行于世矣李大乘先生姓李氏世為平凉府華亭縣之大族幼習儒業長於辭翰早年嘗中鄉選逮中歲至御廉下第慨然有煙霞之志大定戊戌秋丹陽宗師行化西來先生邀于私第事之丹陽日談道妙於是黜妻棄纍改衣執弟子禮丹陽訓名大乘號靈陽子日受真教曲盡妙藴己亥二月十五日丹陽就先生花圃築環與先生同居約百日為期仍贈之詩云西北亭川環堵居此中堪可隱吾軀眼前碧竹數君子面對青松二大夫流水假山兒戲爾清風明月汝知乎若能悟解豫栽韭時宗師環中栽韭以寓意也有分靈光赴玉都丹陽又見花圃中林檎一株久已枯死於四月十四日命移於環內栽之仍作詩云天上三十六地下三十六天地入寶瓶七十二候足後至五月二十日青芽遍吐枯幹復榮丹陽謂大乘曰四月十四乃純陽降世辰也至此日吾之生辰也相去三十六日天地晝夜相合為七十二候足矣先生作異木記以紀其神刻諸貞石無何丹陽挈先生來終南祖庭居數載之間屢蒙印可壬寅丹陽將東歸長春謂先生曰吾道東矣時館陶劉武節得官鄠邑雅與先生相善官既滿請先生東遊至家築菴奉之劉亦入道為門弟子厥後道緣日盛門徒雲集又數年先生示微疾順化其體若蟬蛻而輕遠近觀者大加歎異門人具禮葬於菴側關中兵後道衆即先生華亭環圃大行興建為太清觀矣趙九淵先生姓趙氏諱九淵字幾道湛然子其號也世為隴州隴安縣之右族先生自幼不同兒輩戲狎既長賦性謹願平居寡言體貌魁偉襟度灑落習儒業嘗中鄉試之甲科故隴人以解元呼之不事功名每有高蹈遠引之志年逾三十未嘗婚娶大定戊戌秋丹陽宗師演化隴川一時歸嚮者靈集先生見之而心醉曰此吾歸休之地於是設齊炷香請預弟子列丹陽納之明年丹陽還祖庭先生從居之朝叩夕參於道德性命之學大有所得逮壬寅丹陽仙仗東歸先生往來終南鳳隴之間徜徉自若也河內張邦直尹扶風日常延致其家與之談道每留數月為方外忘形之交先生作文尚平淡詩句雅健得陶謝體每誦老莊黃庭為日課非法之言略不出口聞人談及他人之短輒瞑目不與之相接但云置論徒敗德招怨躬自厚而薄責於人聖人之遺訓也故所至人皆敬慕之正大末鳳隴兵亂先生負笈深入隴山莫知所終及大元撫治輔正洞頁真人于君奉㫖住持終南祖庭尋訪先生遺文得於隴州祐德觀鄭鍊師子周處目之曰思玄集中統初京兆昊天觀先生門人趙志冲於府城之北特置吉地請翰林待制孟攀鱗作志起墳葬先生之衣冠以致春秋之祀云蘇鉉先生姓蘇氏名鉉號雲中子華州蒲城人賦性寬慈謙而好禮遇煙霞勝槩終日忘返大定辛卯春詣終南祖庭丹陽宗師席下乞垂開度丹陽置諸左右教以入道儀範服勞既久未嘗少懈丹陽付授道妙及屢以詩詞接引使進頁功以至心源明了道體冲融一時羽屬皆以小丹陽目之其造道之深可見矣後辭師游海上和光同塵扶宗翊教壬寅夏丹陽東歸復侍几杖逮丹陽之上仙也盤桓登萊之間明昌初長春宗師命先生演教燕薊住崇福觀道緣日興從游者衆一日謂門人曰世緣塵務何時了絶吾其歸矣言訖綵雲繚繞空際枕肱而逝至大元乙巳冬清和真人移葬于五華山仙塋真常真人奉朝命追贈體元輔教雲中頁人號云于通清先生河東隰州人姓于氏諱通清字泰寧道號真光子初母夢神人授丹一粒服之有娠洎分瑞之日紅光照室半日方散夙喪其父所居與神霄宫相近先生髫齓之歲母氏携往宫炷香手指道像而問母曰此聖真者人可得而為乎母曰唯志於道者可得而近之先生心諾其言自是時詣宫嬉游每見黃冠師誦經必澄坐其側諦聽筵終而去既長為人端直不事家産恆有高蹈物表之志但未知所適年幾冠母氏終天葬祭盡禮大定己亥歲忽一道者諧門乞食先生飯之因問將安往道者告以將詣終南參師先生乃從其行謁見丹陽宗師於祖庭丹陽問其行止先生具實以告丹陽留居座下執巾瓶之役數年一日手書立身法付之曰遵是而行仙階可至又屢授頁訣乃得心性圓通後丹陽東歸留先生居祖庭逮明昌辛亥長春亦東還海上先生從居棲霞之太虛觀又數載長春進而前曰聖賢教門方欲開闡汝可分適北京等處弘揚吾道遂授以親翰付畀教法先生承命至霫都環居三載其神光屢見僚庶敦請出環參玄問道者不可勝計莫不虛往而實歸厥後道緣日興度門弟子踰千人唯盧柔和丁至一為入室僚庶選京城東北隅爽塏之地築華陽觀奉之先生亦自號塗陽隱士大安己巳玉陽頁人仙仗北來館于觀下無何挈先生至燕都保賜紫衣師號自是道價益高門徒愈集貞祐甲戌歲蒙長春書召還棲霞之太虛觀俾主觀事興定改元土寇擾攘遷居福山縣杏山村之修真菴忽然先生集衆告曰今日天氣清朗北兵寢息吾其歸矣遂沐浴書頌曰今朝推倒無根樹頃刻扳翻鍊藥罏我獨去時無滯礙杖藜倒曳赴蓬壺擲筆瞑目而逝春秋五十有六時五雲繚繞籠罩菴所竟日不散兵後住持彰德府天慶宫門下法孫李志方遷先生遺蛻葬于府城西北王裕村之仙塋構堂以奉香火矣趙悟玄先生姓趙名悟玄字子深道號了真子京兆臨潼人家世業農寄母胎十有二月生於天德元年五月初二日分瑞之際神光滿室親屬相傳莫不為異既長志尚清虛不樂世味大定庚寅春丹陽宗師率丘劉談三友入關道經零口鎮先生見之識其非凡遂邀至家設齊延待既而與母魏氏並姊弟妻姪六人俱詣終南祖菴投丹陽出家丹陽方急於度人立教俱蒙允納各付以修真微㫖及嗣後屢以法言誘掖皆能為玄門之達者惟先生侍丹陽最久既得法之後於劉蔣居環者數年庚子歲京兆趙恩舍宅修蓬萊菴請先生居環欣然就請兀坐逾十年爾後邠州淳化縣秦莊道友李氏築環來請先生又往居一紀之歲遂得心符至道因折柏四枝插於環中乞今榮茂泰和中咸寧縣樊川雒希瑄聞先生為有道者築環請居之一日房弟雒都巡於京兆茶肆內見一道者來乞錢遂手付一文與之而去後月餘還家謁先生於環堵見而驚曰此向日茶肆乞錢道者也問兄先生亦嘗出乎曰無都巡乃焚香拜禮以宋陽村世業柏坡與先生修全道菴永為棲真福田先生嘗謂弟子然逸期曰京兆太白廟道祖玄元示迹之地向者丹陽已築堂其側他日必為崇福道場汝可居之先生亦時往來其中今果為名觀矣居數載先生復往淳化以大安三年三月十有七日無疾而逝享年六十有三生平暢道詩詞號曰仙梯集行于世度弟子數百人惟王德遇然逸期為入室後移葬先生於樊川全道菴之柏坡訪平凉同知楊庭秀為作墓碑以紀其道行天興兵後就全道故址大行興建為翠微宫矣壬子歲真常真人炷香祖庭贈以弘玄真人號假明源先生世居平水法諱光普字明源道號真陽子幼而聰慧長而豪俠因酒誤傷人肢體避罪入關中偶至終南祖庭聞丹陽宗師談道大有開悟於是焚香拜禮懇祈出家丹陽見許恭執勞役以事左右數年之間漸有得於心一日跪告師前丹陽教以寡欲澄心摧强挫鋭先生既蒙印可行其所受之學不數載乃得心字膽明臻於妙道遂杖策還河東於稷山縣城之北築了真菴居環堵自此依歸者衆歲壬寅夏忽謂門人曰丹陽宗師將東歸可備香信汝等隨吾往謁即出環率衆而行甫抵潼關仙仗果至矣丹陽叩其所修先生以所進答之丹陽嘆曰關中已有趙悟玄河東又得段明源吾教得所傳矣先生拜辭而回道價益高三原楊明真聞之往詣參請多蒙指授仍以物外人詞見贈逮明昌改元二月二十八日先生召門人曰吾有三山之遊沐浴書頌云歲久樂希夷光明性燭輝靈通三島路氣結六銖衣放曠無拘束逍遙出是非默然無一事鶴馭綵雲歸書畢曲肱而逝目光炯然數日不落備禮葬于了頁菴側平生歌詩號曰明源集行于世矣終南山祖庭仙真內傳卷上
