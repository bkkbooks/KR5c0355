front:
  text: 終南山祖庭仙真內傳卷中川三
  hash: sha256:22cde250682d9f145a761cffb4ec3dca91b33c5b5c581911c87f7781ec96a8bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0355_HFL_002-001a, image: hfl/0604/0604-110.png}
body:
  text: 夷山天樂道人李道謙編柳開悟先生陜右坊州人姓柳氏諱開悟字巨濟道號無染子性聰敏少言家富不喜華飾業進士博識强記能屬文再赴廷試而還鄉中以才名推為州學録大定壬辰春因游長安遇丹陽宗師與之語及贍以詞先生有所開悟遂捨家從之游居劉蔣祖菴踰十年於道大有所進與曹瑱來靈玉劉真一李大乘雷大通李大莖趙九淵輩俱在丹陽門下時人稱之曰玄門十解元丹陽東歸先生與諸公亦從行逮丹陽上仙先生於明昌間奉長春宗師命演化燕薊既而遷固安之棲玄菴以崇慶改元壽終兵後乙巳冬十月清和真人移葬于五華山庚戌冬掌教真常真人奉上命贈明玄崇德無染真人號仍作暮碣銘任守一先生姓任氏諱守一道號自然子世為京兆鄠縣之農家體幹魁梧胸襟開朗不拘小節性喜射獵一夕夢鬼使攝入陰府歷見罪囚校對拷掠之事覺而有悟因毁弓折矢對天自盟願改前非以新厥德徑諧劉蔣祖菴丹陽宗師門下求受道業丹陽斥逐至於數日其心益堅乃納之俾就環堵供事飲膳三載之間服勞益謹未嘗須臾少懈丹陽憐之指授真訣教以忍辱降心調鍊神氣久之心地虛明漸有所得一日跪前告曰庸鄙凡愚蒙師開悟顧無以報願垂慈憫不棄陋拙更執汲爨三年丹陽却之曰汝向時未悟須當服勤效役今既有所得當進汝真功接引後進於是先生拜辭乞食河朔間道緣日盛至大定癸卯冬聞丹陽返真先生廬墓三載未幾忽召門人曰昨夕師真有命令從遊道山沐浴更衣翛然順化即明昌改元四月十四日也兵後門人移葬于登州蓬萊縣百澗村重陽觀搆堂設像矣楊明真先生姓楊氏世為耀州三原縣人父蕃母劉氏以天德庚午歲十一月十八日先生乃生分瑞之際青氣盈室幼而孤梗不與羣兒戲狎既長每發浮生如電之嘆志慕仙道當大定十四年聞丹陽宗師弘全真大教於終南祖庭即棄家特諧門下乞垂開度丹陽見其體貌魁梧胸襟開朗嘆曰此真仙材也因訓名明真號碧虛子授以還丹泝流之訣先生既得受記頭鬅面垢乞食度日或歌或舞佯狂玩世人皆以楊害風呼之常持一馬杓以為飲器隱迹丐徒中數歲不語志逾金石盤桓終南鄠社間後聞丹陽上仙東游海上奠祭墳壠覲謁長生玉陽二宗師多蒙指授迤邐西歸嘗聞稷山縣真陽子段君為丹陽許可取道河東炷香參拜段君密授道要又以物外人詞贈之先生辭而還秦自是了無疑障徑入京兆省前宣詔廳忘言危坐雖紛華滿前未嘗一盼而已心灰體槁如在山林一紀之歲入於大妙承安己未轉運使高德卿忽患心痛百醫不效屬纊之際夢先生以水噀之遍身汗出倏然而蘇不數日四肢康豫親諧宣詔廳焚香拜謝多贈金帛先生不受復作詩十絶謝之重午日先生在清真菴畫地為爐撮土代香翠煙靄出盤結丈餘旋為華蓋移時不散時有數鶴飛嗚其上萬目仰膽靡不讚異由是統軍完顔公助資興建即今之丹霞觀也蒲城老蘇兩膝拘攣不能步履先生以水噀之奔走如故厥後里人之疾者竟來求水先生厭其紛冗呪水一杯注之井中有聲如雷自此疾者汲而飲之無不痊差迄今號曰法水井無何還祖庭間居召門人修齊集衆嗣法於無欲子李公及請知觀畢知常囑以藏身之地留頌云八十年來如電拂一堆臭腐棄荒田豫今去後全無礙撒手歸空合自然置筆奄然順化福山宋昭然者與先生素不相協先生窗外與之告别宋遽出户迎待適人來報先生羽化時正大戊子六月十一日也享年七十有九度門人數百輩平生著述目曰長安集行于世葬于劉蔣之仙蛻園庚戌冬掌教真常真人奉朝命追諡曰碧虛毅烈真人周全道先生姓周名全道世為古豳之巨室生於皇統乙丑歲十二月二十二日自幼語默進止若成人狀貌奇古神清雅淡夙喪其父生理蕭索竭力以事母母忽感奇疾百療不愈先生割股與藥同進厥疾乃瘳鄉黨以孝聞年及冠里人有以子妻之者先生婉其辭而却之及母氏之終天也哭泣過哀幾於滅性歎曰吾嘗聞道家有言一子進道九祖登仙欲報罔極之恩無踰於此時大定癸巳歲丹陽宗師環居終南祖庭演全頁教法先生遂諧席下求受道要丹陽納之俾與弟子列自薪水舂爨皆使親歷先生恭服勤勞數年匪懈丹陽察其有受道之志一日召入環室授以真誥及賜全陽子號先生既得法克己鍊心行其所受如是又數載合堂雲衆莫不服其踐履之實無幾何丹陽謂曰豳近邊鄙教化難通汝當往居以弘吾道先生受教而往卜菴玉峰山下頤神育浩演化度人各隨其根性淺深皆蒙啓發至於疲癃殘疾嬛獨鰥寡而無告者收養於菴中由是鄉里士庶日益敬仰豳人為之遷善壬寅丹陽東歸先生每至清明必躬詣祖庭奠祭歲以為常貞祐間羌人陷豳先生亦在虜中雖被俘縶其精進道業略不少渝羌識其為異人遂釋之四方來受教者不可勝計俱令各立方所誘掖後進元光末尚書左丞張公信甫出鎮豳郡素忌先生之名徑來玉峰叩其所修先生告以道德性命之理公喜其誠出而語人曰周全陽有道者也翌日設齊仍贈袍履時遣人候問起居先生亦常往來寓居長安之漢高祖廟統軍完顔公待以師禮正大戊子復還豳以十月十有七日命衆作齊召嗣法門人圓明子李志源囑之曰終南南時村祖師開化鍊真之地吾欲修建以彰仙迹奈世態如此不可强為也他日升平之後汝輩當勉力以成吾志言訖令侍者焚香命衆誦清靜經先生危坐澄聽甫竟三過枕左肱而逝春秋八十有四葬於玉峰菴側士人王才卿者與先生為莫逆時仕慶陽方天兵圍城甚急忽夢先生飄然而來曰吾今特來與公相别軒冤儻寄不堪久戀此身一失再得實難珍重而去未幾圍解王乃訪人始知先生入夢告别之日即返真之辰也遽解印綬黜妻子樂道以終其身先承安戊午歲東魯鄆城縣洞虛子張志淵者嘗兩夢神人持白刃叱之曰爾年將盡胡為不參師學道以免速死耶既覺心神恍惚因詣郭西郊行俄見一道者麻衣草履軀幹魁偉自西而來就張言曰汝有宿緣故來相接即於路左教以修真密㫖及以麻絛贈之且曰敬之哉無忘吾訓三十年後當有吾門人來此與汝相會是時汝得與師真結大緣矣張請其姓名答曰吾關中周全陽也俄失所在張遂易衣入道後於濟州創白雲觀度弟子數百人悉立菴觀於齊魯之間壬辰六軍下河南李圓明挈衆北渡於東阿縣築棲真觀居之張聞往謁告以向日遇師之故圓明出先生畫像示之張焚香致拜曰此正吾曩者所遇師也以圓明為道兄焉乙未關中撫定圓明追念先生遺命率法屬百衆西歸於南時創成道宫張洞虛屢輦金幣以資其用不十載雄構壯締痚豁可觀辛丑春清和真人命門人捧先生遺蛻葬於劉蔣之仙蛻園壬子掌教真常李君奉朝命追贈全陽廣德弘化頁人號喬潜道先生家世平陽族喬氏名潜道號冲虛子賦性沈靜素嗜玄虛大定壬辰歲時年三十有六與里人李冲道同游終南拜禮丹陽宗師求受全真教法居劉蔣祖庭採薪汲水供事道衆艱辛備歷略不敢怠一日丹陽授以玄㫖仍付詩二絶云樂天知命不愁窮懷玉身心衆莫同烹鍊神丹憑匠手須教鼎內雪霜紅道中玄妙與誰窮撞著知音語話同守黑不教心上黑丹紅勝似面顔紅先生既得道訓與同志李君相為切偲克勤道業逾十載故能各造玄奧壬寅丹陽東歸先生與李君共游郃音閣水乞食度日既而劉户部好謙語人曰昔列子居鄭圃四十年人不知其有道蓋懷道抱德之士如良賈之深藏其貨惟恐人知吾觀喬李二仙其斯人之流乎縣人聞之日加敬仰擇故城之東北隅築太清觀事之丙午長春宗師演教祖庭二公徑來席下日親教語長春察其所安忽謂衆曰喬李二公克勤于道真吾門之達者自是道價日益高明昌辛亥承長春命同弘化河東於臨汾築冲虛觀居之泰和壬戌復來郃水棲真接物貞祐丁丑春三月因與士人王可大坐間忽曰吾敢少煩於君願助一袍以贐吾行不數日無疾而逝享年八十一可大來弔方知索袍謂棺也時門人李道隱居於他所一旦先生突然踵門密有規誨臨别又曰明日可一來吾别有所屬翌日道隱行至中途逢人來報先生昨日已羽化矣方知來者身外之化身也李冲道先生姓李名冲道清虛子别號也家世平陽性剛毅善辭翰事父母孝於大定壬辰間年幾不惑遂與同里喬潜道結為林下莫逆友偕諧陜右終南丹陽宗師門下求受道業宗師視其可教留與弟子列舂爨灑掃勤事數年愈久愈敬宗師一日授以祕㫖仍贈之詩云逍遙物外興無窮且恁和光混俗同堪嘆浮云虛幻夢恰如敗葉舞秋紅任人間笑道家窮一志修仙俗匪同三伏洞天霜雪降靈苗慧草轉添紅先生既得印可篤志於道脅不占牀者僅十霜故得心宇泰定忽夜見神光照室朗如白晝遂與喬君同往郃陽丐食鍊行弘演真教丙午長春自隴山來祖庭復詣座下參進上道逮明昌辛亥長春東歸命先生與喬君弘化河東於臨汾縣西築冲虛觀居之度門弟子數百人造菴觀數十區長歌短詠稍露玄㫖喬君責之曰道人貴韜光晦迹目今向上真師在世止可各進頁道先生謝而焚之一旦命衆具湯沐且曰吾世緣已盡今當歸矣囑門人以志道之語翛然順化非煙非霧遍覆庭宇三日而修士庶膽拜靡不歎異葬于冲虛觀構堂造像以奉香火趙九古先生姓趙氏諱九古道號虛靜子家世檀州祖宗簪纓相繼咸有政聲父淄州太守改同知平凉府事因家焉先生大定三年癸未生天姿淡靜日者相之曰風清骨奇非塵坌中所能留也夙喪其父每有升虛之志十七年丁酉母欲娶之而不從命屢請入道母數詰責知其志不可奪乃從之聞府中崔羊頭者為有道往師焉崔命執厨爨之役每夜令造食五七度度必改味及所進亦不多食亦不令多造使通宵不寐如此三載其心益恭亦無分毫驕氣人以內奉先生呼之崔知其可教十九年己亥俾先生詣華亭丹陽席下請益丹陽納之庚子丹陽還終南命先半往龍門供侍長春而親訓炙長春易名道堅時往來於平凉丙午長春挈居終南祖庭長春起戊申之詔也留先生事靈陽李君明昌辛亥長春東歸海上携過掖城命謁長生未幾長生令先生歸棲霞長春喜其來也命充文侍掌經籍典教凡僚庶道流來謁必先參先生然後入拜丈室其為文清古筆法類瘞鶴銘逮己卯歲長春赴詔適西域選侍行者先生為之首至賽藍城先生謂清和尹公曰我至宣德時覺有長往之兆嘗蒙師訓道人不以死生介懷何所不可公等善事師頁言畢而逝享年五十有九葬之郭東原上迄今土人祀之初長春過阿不罕山留宋道安等九人建棲霞觀以待至壬午為惡人妬忌起訟衆皆憂懼道安晝寢見先生自天窗而下曰吾師書至道安曰自何來曰自天上受而觀之止見太清二字宋覺白於衆翌日果有書至自行在訟事乃寢蓋先生之陰護也癸未長春東還過其塋域諸友欲扶櫬而歸長春止之曰四大假軀終為棄物一靈真性自在無拘奚拘拘然以棄物為念哉明日遂行既達漢地自雲中武川㶟陽燕薊十餘處見先生單騎而至預報長春宗師東還何不遠迎其神異之迹不能備紀姑録一二以表死而不亡者也庚戌歲真常真人奉命褒美道門師德贈先生中貞翊教玄應真人號葬冠履於五華山以奉歲祀焉陶彥明先生平陽襄陵縣人幼而好道事父母以孝聞年逾三十怙恃俱失先生哀毁過禮服闋慨然置家纍渡河而南寓居靈寶縣欲投師學道罔知所適大定癸巳歲河間許子靜來為縣宰見先生氣質淳正且告之曰公果欲慕道修仙非得師匠徒費世祀吾聞丹陽馬君弘全真之教今居終南汝可依歸仍作詩送行先生徑詣劉蔣丹陽見之如有夙契留居座下與之名曰彥明字明甫親炙日久教以性命之理朝夕訓誨以至心地開通了無凝滯使之游歷詣方究取父母未生前去先生卜居渭南簞食瓢飲行其所受於師者若將終身焉不數歲丹陽召還祖庭問以日用且嘆曰純而不雜者其惟陶明甫乎賜之號曰無名子既而丹陽東歸先生亦出關棲止于洛西抱犢山尋遷桃花山隱居逾二十年忽告其徒曰吾昨於定中偶憶先世嘗居靈光洞今失其所在後因遊女几山見石壁間有刻靈光洞三字中有石牀鐵臼尚在遂葺居之衆驗其言益加信敬隱餘十載俄遷居長淵人莫測其意不數日北兵掠女几民多被禍獨長淵無一騎之來人益服先生有預見之慧雖法壽甚高而步履康健精神悅懌可見平日鍊養之功也正大丙戌秋雲溪菴門人狄抱元王抱真請先生就菴過冬先生辭曰此中已備結冬之計待來春當往彼作歸休之所丁亥三月六日杖策抵雲溪與道衆笑談終日翌旦更衣端坐索紙筆書頌奄然而逝享年八十有六停柩七日頰紅頂溫如熟睡狀殯於所居靜室明年離峰于君葬諸鳳翼山之西啓棺形質不變香風滿谷萬人膽拜莫不讚異故左丞姚樞為作墓銘以紀靈異焉王志達先生延安之大簇姓王氏名志達道號玄通子生於天德庚午歲十二月二十九日夙喪其父妙齡雅負清鑒每歎世緣虛幻有超然拔俗之心既長以户殷充里正徴斂廉平鄉人敬之以大定丁酉歲因友人得疾數日身化為大蛇惟頭面未變先生視之友曰公輩可備筐器送我於山不然恐頭面隨化傷及生人先生揭衾一視其項已下果為蟒矣遂與家人送至山麓間即附草而去先生驚駭從此長往不歸路逢異人授以玄㫖且曰今丹陽師演化于終南可往師焉俄失所在先生徑往求為度脫丹陽初不納至於責辱數日求教益堅憫其誠至留居席下俾隨衆執役教以忍辱鍊心居數年其勤儉謙退愈久愈篤未幾丹陽以道德性命之要付之先生既得法卜雲陽縣環堵默坐一十三年乃得心光內發吐為辭章吻合玄理度門弟子數百人後復還延安五月大旱官民問先生雨期曰今日小雨未能霑足過此三日澤大足矣至期果如其言泰和間羌人入寇人心駭懼先生徐曰請無慮昨吾定中見三千無首人驅五百大獸至後數日捷書至果梟首三千級獲駝五百餘頭四方聞之益加敬奉一日於市肆中小酌出門仰膽天表還入坐索紙筆書頌云一輪紅日耀中天五色祥雲頂上旋珍重一聲歸去也倒騎玄鶴海東邊擲筆曲肱而逝時大安庚午十二月初二日午時也享年六十一平生著述號玄通集行于世葬于府城之東南天興兵後門人就先生葬所建玄通觀以奉香火焉薛知微先生世居河東河津縣乃唐征遼將軍薛仁貴之遠孫也法諱知微字道淵號碧霄子以天德庚午歲生幼不嬉戲長慕清間性沈默寡言年踰弱冠酷好養生性命之學大定辛卯歲丹陽宗師演教終南聲揚遠邇先生乃黜妻子敬謁席下操紼篲以侍門庭前後三霜始終一節丹陽識為受道器乃付以修真祕㫖先生既得其傳復還鄉里築菴守靜調氣養神如此六載故得心宇泰定性天疏明辛丑再至祖庭奉師進道忽一夕天澄月朗輒起取薪置諸屋下衆皆訝其誕比明雪已盈尺共服先生有靜定之功洞見未然癸卯二三道侣拉同遊天壇先生曰王屋洞天素欲一往安樂窩中可以託宿既至主人迎居一室軒扉雅敞榜曰安樂窩同行者相視歎曰先生誠有道者也時丹陽東歸海上冬法弟王志一欲遊寧海參師與之相别先生慟哭衆莫測其所以及王抵寧海丹陽已羽化二旬矣未幾復還鄉中王汝霖來見先生曰胡不早求良醫疹治厥疾王時無恙聞先生之言不以為事未及月忽中風而卒崇慶間儒士吳世傑薛國寶問先生秋試題目對曰三王以賞刑致康至期果然二人皆第又一日杜仲敏者來菴間話先生笑曰公可速歸落井之婦猶可救也杜蒼忙至家果如所告先生預見未然皆類此後南渡遨游嵩少間尋遷內鄉愛其人淳景秀即結茅隱居多所接引至正大壬辰冬十月三日無疾而逝享春秋八十三所作詩詞號清虛集度門弟子數百人唯侯志忍柳志春唐志安范志冲四人為入室皆立觀度人於河東雲應間為當代之高道兵後遷先生遺蛻葬於終南山下鄠縣遊仙宫之集真堂掌教真常李君奉朝命追諡先生曰升玄真人云陳知命先生姓陳名知命道號朝頁子終南縣袁村人與劉蔣為鄰疃重陽祖師纍會化度先生以家産殷富未能遽拋塵纍後因丹陽等四真來居祖菴先生頗有入道之心一日丹陽宗師以青包巾一頂作詩贈之云青雲翦破作雲包熟視陳公有分消顧我共君同宿契願君同我樂逍遙長生路上尋金礦不夜鄉中採玉苗何啻一身超達去九玄七祖上丹霄先生既蒙點化嘆曰向日重陽纍會化度我已愚昧不能從師高蹈儻一朝大限臨頭寧得以此薄業少延一日之生耶即日禮丹陽為師改衣入道丹陽以先生有幹濟才俾充祖庭菴主積行立功十載之問每以醫藥救人多種陰德其道衆多賴芘蔭丹陽每作詩詞教戒先生修頁處諍大造其妙無何退職間居丹陽以吕道安代主菴事先生專以修進為業至承安丁巳忽以手撫吕背曰公緣法甚大將來此菴為觀之日度道士數百人為門弟子是時吾道大弘公適當其時善自保愛吾其歸矣言訖遍辭道侣怡然順化享壽八十有一停柩三日肌體輕軟目光炯然明年玉陽宗師買祖菴為靈虛觀保賜吕道安冲虛大師號俾掌敕牒主領觀事後果度道士僅三百人皆符先生之言矣宋明一先生姓宋諱明一號昭然子登州福山縣人乃祖及父世為縣吏以廉平積德見稱于鄉里先生幼習儒業長於詞翰每以此世為不足玩發出塵學道之志年踰三旬辭親長往徑入關中禮丹陽宗師出家千磨百鍊志如金石服勤之暇其於修真習靜之業與日俱進丹陽付之曰訣仍以青華陽巾賜之先生拜受以其師之所賜終身收掌每到旦望頂之朝拜真聖逮大定壬寅春丹陽鶴馭東歸先生侍行至海上日以其母兄姊姪六人俱禮丹陽入道明年冬丹陽上仙先生復入關居祖庭丙午率衆諧隴山請長春宗師還終南大弘祖教明昌辛亥長春仙仗亦東遊先生受法㫖充祖庭尊宿自後凡入道者令先生為引度師至正大丙戌北兵下秦川民庶驚擾避地南山道衆俱入潦谷先生獨不肯往衆勸之行先生曰吾之宿債安所逃乎汝輩可行吾獨於此守之不數日邏兵卒至靈虛殿宇悉為灰燼先生亦被害翌日道衆下山視之膏血不流可謂純陽之體嵇康羅公遠之流乎時十月十有三日也享壽八十四至大元壬子春正月掌教頁常真人李君奉朝命追贈先生以無憂頁人號云呂道安先生姓吕氏諱道安世為寧海巨族幼年穎悟志慕玄風仙姿道骨稟於天然事父母孝聞於鄉里年僅三十二親俱喪盡葬祭禮慨然捐俗入道是時馬談丘劉四師於終南守墳先生隻身西來納拜於丹陽宗師丹陽與先生同里閈素知門第清潔遂令服勤左右既薰陶日久乃能了悟道妙大定庚子歲丹陽俾先生充祖庭菴主撫育道衆時靈陽李君在世亦多蒙啓發丙午長春宗師自龍門來居祖庭數載之間日親玄訓於道了無疑障明昌辛亥長春仙仗亦東歸先生修身以敬蒞衆以寬道風不减師真在日乙卯朝省罷無敕額菴院悉沒於官祖庭亦在其數自是門庭蕭索道侣散逸承安丁巳時玉陽真人被召闕下遣人來召先生明年春至燕都玉陽買祖庭為靈虛觀仍保授先生冲虛大師號使掌敕牒主領觀事且曰重陽祖師徒步數千里來化我輩端為教門後事我雖不能親往來嘗敢忘汝於祖庭夙緣甚厚善為主持及以詩贈之云大悟威光朗太空先天真瑞信匆匆虛無清靜全今古至道流傳正祖宗三界十方通一致千經萬論了無窮忘情自現天元主透出陰陽造化中先生西歸祖庭因緣復振不數載買度為道者皆以先生為師僅三百人買額為觀在陜右者數十區至興定辛巳二月十三日囑門人以修進之語以法弟畢知常嗣主觀事翛然順化享年八十葬于仙塋諸師之側大元壬子春掌教真常真人李君奉朝命追贈先生以凝虛真人號畢知常先生姓畢諱知常世為乾州醴泉之巨室昆季四人俱好清虛無為之學大定壬辰歲聞丹陽宗師於終南祖菴弘演真教偕來席下出家丹陽各付祕訣節次授以詩詞誘進以至俱能深造道妙翹翹為人天師惟先生最幼置之左右執巾瓶之役日夕訓誨歲月既久故偏得修身性命之要逮壬寅夏丹陽東歸囑先生西入隴山侍長春丘君採薪汲水凡五年每進饋之暇危然澄坐通夕不寐以修靜定之功明昌辛亥長春仙仗亦東游留先生與吕道安同主祖菴事先生於吕雖為昆仲待以師禮六年乙卯朝省新法以祖菴無敕額例沒於官承安丁巳先生往海上謁諸宗師長春以所有之資傾囊盡付及親作疏文俾先生化導諸方為重建計明年春先生上燕都玉陽時應命闕下召吕道安至燕買祖庭為靈虛觀仍保賜先生通真大師號令副知觀事與吕偕西歸祖庭道風為之再新先生尤善醫藥聞人之疾不擇貧富必往救之至興定辛巳吕道安上仙先生嗣主靈虛香火其殿堂廊廡創造增葺者甚多道緣日弘不數歲度門人踰百衆無幾何謝觀事間居退隱岐山縣五姓之洞頁觀和光同塵頤真養浩時亦一至靈虛綱領觀事正大辛卯關中受兵先生與居民同避地於太白山之峽至三月十六日告門人曰昨於定中山靈潜報此地不堪久處當徙之他所世態如此吾不忍見即焚香辭聖翌旦奄然長逝門人葬于所居之石室居民有聽其言而去者不數日兵至不去之民俱被禍大元庚子冬洞頁頁人于君奉朝命來住祖庭念及先生同出丹陽之門又為平昔莫逆友為衆言曰畢通真昔居此踰五十年恢弘祖教實吾門之大士也遂命門人遷先生遺蛻葬於劉蔣之仙塋壬子春掌教真常李君奉朝命追贈先生曰廣容真人終南山祖庭仙真內傳卷中
