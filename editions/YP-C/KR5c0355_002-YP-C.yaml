front:
  text: 之游沐浴書頌云𡻕久樂希夷光明性燭輝靈通三島路氣結六銖衣放曠無拘束逍遙出是非默然無一事鶴馭綵雲歸書畢曲肱而逝目光炯然數日不落備禮葬於了眞菴側平生歌詩號曰明源集行於世矣
  hash: sha256:24e60da6d5b4c777a074ba46c6c5b40e1b92f82c86dc7ca7915d6c162d2f95fb
