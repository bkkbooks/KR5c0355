body:
  text: 師姓尹氏諱志平字大和遠祖居滄州前宋時有官萊州者因家焉顯高祖妣有子七人俱登進士第仕至郡守者五人大父公直考弘誼皆隱德不耀於大定九年己丑正月二十日生師是夕其母方寐夢儀衞異常皆盛服而入神思愕然驚寢師已誕矣時里人相驚曰尹氏宅火奔往救之至則光照庭宇知生子矣咸曰是家陰德動天他日必爲異人三𡻕穎悟善記事五𡻕入小學日誦千餘言於理卽玄解在髫齔日舉止異凡兒嘗因祀事究生死理杳然遐想自忘十四𡻕遇丹陽宗師遽欲入道其父難之濳往十九𡻕復迫令還家錮之竟逃出再三始從之詣武官靈虛觀長生宗師席下執弟子禮尋往昌邑縣之西菴常獨坐樹下達旦或一夕靜中見長生飄然而來斷其首剖其心復置之覺而大有所悟後住菴福山縣惠濟貧困者數年眾德之明昌初聞長春宗師還棲霞往侍左右長春特器異之付授無所隱玉陽王宗師屢握手談道授以口訣又受易於太古郝宗師皆世所未嘗聞自是道業日隆聲價大振四方學者翕然宗之時濰州龍虎完顏氏素豪倨慕師道德施囿地創玉清觀事之數載之間姬侍供奉者未嘗識其面目亦未嘗知其姓字其所守如此興定己卯𡻕冬大元太祖聖武皇帝自西域遣便宜劉仲祿徵長春宗師仲祿及益都會眞常李公曰長春今居東萊非先見尹公必不能成此盛事及濰陽謁師於玉淸見其神采嚴重不覺畏敬自失從容語及詔旨師大喜曰將以斯道覺斯民今其時矣遂偕往覲長春於萊州昊天觀先是金宋聘命交至皆不應至是長春與師議決計北上時從行者十有八人皆德望素重者師爲之冠自庚辰春啟途至癸未秋回轅四載跋涉備嘗艱阻旣見上於西印度奏對稱旨還及雲中長春聞山東亂天兵又南下曰彼方生靈命縣砧鼎非汝莫能救因遣師往招慰聞者樂附所全活甚多甲申𡻕敕令長春住太極宮卽今之長春宮也師在席下最爲入室四方尊禮者雲合師曰我無功德敢與享此供奉乎遂辭退住德興之龍陽觀屢承長春手澤示以託重意及蒙賜淸和子號迨長春上仙師方隱上谷之烟霞觀又欲絕迹遠遁爲眾以主教事敦請勉從之還長春宮以嗣玄教厥後門徒輻輳輦幣樂貢者日充塞庭戸壬辰春太宗英文皇帝南征還師迎見於順天慰問甚厚仍令中宮代祀香於長春宮貺𧶘優渥癸巳夏游毋閭山太玄觀之李虛玄語人曰去年院中青氣氤氲者累日占者以爲當有異人至今師來旣驗矣其演化白霫之間道緣眞蹟備見北游錄至甲午春南歸及玉田眾喜爲數日留日已晡遽促駕兼夜行五六十里舍豐草中眾莫知所以後還宮始知在玉田時有寇數十欲劫掠追至大合甸不及而返從者相賀曰非師奈我輩何夏聞朝廷遣官撫綏關輔適無欲李公自衞來燕致祭處順堂師命入關招集道侶興復終南劉蔣之祖庭秋中宮遣使勞問賜道經一藏乙未春沁州牧杜德康請師主黃籙醮事師由雲應南下所至原野道路望塵迎拜者日千萬計願納宮觀爲門弟子者若前高之玉虛崞縣之神淸定襄之重陽平遙之興國咸請主於師及理醮時旱久且風醮之三晝宵燈燭恬然在他境猶風杜以州之神霄宮爲獻尊事之師以玄化大行歸功於重陽祖師乃留意於終南祖庭冬京兆總管田德燦遣官偕無欲李公馳疏來請雅與師意合丙申春正月始達終南規度兆域初重陽祖師修道於劉蔣村旣成火其菴而東貽詩有後人復修語先大定間丹陽長春二宗師已嘗建立值天興劫火焚毀殆盡至是師賡之亦有繼祖來修之什於是翦蕪平邱築垣架屋而草創之又若樓觀宗聖宮終南之太平炭谷之太一驪山之華清太華之雲臺諸宮遺址悉擇四方緣重耆德付之俾任興復之責時陜右甫定遺民猶未安業道眾艱於得食師以道德罪福之報撫慰之是年夏被命令師選戒行精嚴之士就禾林住持爲國祈福秋中書楊惟中召還燕道經太行山間羣盜羅拜受教悉爲良民戊戌春忽曰吾老矣久厭勞事以正月上日會四方耆宿嗣法於眞常李公俾主教席遂於長春西院及五華大房增葺道院以爲佚老之所庚子冬京兆太傅移刺寶儉總管田德燦請師主重陽祖師葬事師欣然而往雖冒寒跋涉不憚也常曰吾以報祖師恩耳當時秦地大旱師下車而雪大闡葬禮以明年辛丑正月二十五日旣事時盛行興造及經理會葬者多方道俗常數千人物議洶洶不安賴師道德威重鎮伏邪氣故得完其功師嘗與老師宿德往來於樓觀諸宮逍遙自若以揚玄化是𡻕冬十月仙仗還燕山居五華大房之間遠近達官士庶仰之如景星丹鳳乙巳春命潘沖和主領河東永樂純陽宮之法席以事建立無何中宮遣近侍賜黃金冠服仍敕有司衞護又令門人增飾濰陽之玉淸不數載奐然一新矣至辛亥二月五日謂侍者曰我常便房山之幽邃故居之今爲我灑掃殿宇以備長生昇仙之齋翌日焚香禮聖畢謂眾曰吾將逝矣眾驚愕師嘿不應惟戒葬事無豐遂不食但飲水歠茶危坐談道語音雄暢如平日是夜正衣冠曲肱而逝享春秋八十有三門眾毀哭若喪考妣時馨香之氣滿室遠近聞者奔走賻賵絡繹如市初師遺言葬大房嗣教眞常李君以大房去京師稍遠艱於登涉輦柩葬於五華構堂曰復眞以事香火師平日著述目曰葆光集行於世中統二年秋九月璽書追贈淸和妙道廣化眞人號師族李氏諱志常字浩然其先洺州永年人宋季避地濮之范陽尋又徒開之觀城因著藉焉高祖皓曾祖昌祖明父蔓皆隱德不耀素爲鄉里所重母聶氏夜夢異人授之玉兒覺而生師卽明昌四年癸丑正月二十日也師生六𡻕考妣俱喪養於伯父濟川家濟川諱蒙名舉子也賦義兩科屢占上游雖以四舉終場同進士出身歉如也愛師穎悟不羣意用作成以償平昔之願而師不喜文飾雅好恬淡常默禱高穹望早逢異師勝友式副夙心年十有九伯將議婚師聞之歎曰本期學道未涉津涯若愛欲纏縛則聖賢高蹈出塵之事業難乎有成矣居無幾負書曳杖作雲水之游初隱東萊之牢山復往天柱山之仙人宮宮之主者曰湯陰李先生有藻鑒見師儀觀魁偉固已知其不凡因冬夜談道言及日用乃大加賞異退謂其徒曰余在道三十年老師宿德與之談論者能如此子精當曾不一二見迨辭始吿之曰君玄門大器也山菴荒僻非君久淹之地海上昔祖師至異人並出今獨長春在焉宜往從之他日成就未可量也師翌日遂行至卽墨之東山屬貞祐喪亂土寇蜂起山有窟室可容數百人寇至則避其中眾以師後拒而不納俄爲寇所獲問窟所在箠楚慘毒絕而復甦竟不以告寇退窟人者出環泣而謝之曰吾儕小人數百口之命懸於公一言而公能忘不納之怨以死救之其過常情遠甚爭爲給養至於康調迄今父老猶能道之𡻕戊寅夏六月聞長春宗師自登居萊師促裝以往拜謁席下長春一見器許待之異常師於承教之後益自奮勵厯兵革死生憂患之際曾不易其所守山東東路轉運使田琢器之高其行且聞昔在卽墨其主帥黃摑副統咨師籌畫保完一城以書邀至益都待以賓禮己卯夏六月益都副帥張林叛金歸宋冬十有二月太祖聖武皇帝遣便宜劉仲祿齎詔備禮起長春宗師於東萊師覩此事機知張林新以其地入宋叛股靡常密念若不先入白則必見阻滯乃往說林曰長春師天人也今三使徵聘毅然北行舍近道而卽遠途救世之心於斯可見相君能爲推轂則非惟一方受賜實四海生靈無涯之福也林悅移檄所經俾衞送以行庚辰春正月長春命駕從行者一十八人師其一也二月達燕明年春北上秋七月至阿不罕山距漢地僅萬里並山漢人千家逆塵羅拜以爲希世之遇咸請立觀擇人主之長春坐上指師語眾曰此子通明中正學問該洽今爲汝等留此其善待之因賜號眞常子仍預書其觀曰棲霞長春旣西邁師率眾興作刻日落成又立長春玉華二會至今不輟癸未夏五月長春至自行在憩於其觀一日齋客四集長春手持弓絃一不言以授師師亦不言而受圈而佩之作詩爲謝長春但笑領而已蓋阿不罕之留弓弘之授識者知其有付囑之意秋七月至下水時殘暑尚熾長春納涼於官舍之門樓宇呼師而教之曰眞師不易逢得道者不易遇遇之而不易識也守道之篤人貌而天行直寓六骸而淵宗忘飢渴而常甯至靜而遺形獨游乎無極之妙庭此語汝當記之以俟他日自得之耳師拜謝已乘間因問向者避地山東爲寇箠撻俄墮窈冥赫日方中而目無所見幽明路隔其歸根復命之理果何如哉長春曰人之生死猶晝夜乃幻相相因之道叩其道之至則無有也當汝疑念未起時體取死生晝夜了無干涉則天光湛澄若太虛之無際名言象教不可得而喻斯汝疑心淨盡之地師復再拜受之長春自入漢地人事益繁四方道俗來覲謁者皆託於師師陰蓄歸隱之念而未有以發雖心交不知也長春忽語之曰昔有一道人趙其姓初在門下向道甚勤一日遽辭欲往他所我因戒之曰不應去而去不爲退道卽爲慢道師愕然知斯言爲己設其念遂絕師以長春西域見上演道之語編爲西游記行於世丁亥秋七月長春仙去清和嗣教以師爲都道錄兼領長春宮事當時朝廷在禾林師𡻕一往以扶宗翊教爲己任雖龍沙風雪寒裂肌膚弗憚也庚寅秋七月太宗英文皇帝始卽大寶師見於乾樓輦時方詔通經之士教儲君師乃進詩書道德孝經上嘉之冬十一月得旨方還辛卯冬有誣告處中堂繪壁有不應者清和被執眾皆駭散師獨請代之曰清和宗師也職在傳道教門一切我悉主之罪則在我他人無及焉使者高其節從之特免杻械鎖之入獄夜半鎖忽自開師以語獄吏吏復鎖之而復自開平旦吏以白有司適與來使會食所食肉骨上隱然見長春相其訟遂息癸巳夏六月承詔卽燕京教蒙古貴官之子十有八人師薦寂照大師馮志亨佐其事日就月將而才藝有可稱者乙未秋七月奉詔築道觀於禾林委師選高道住持戊戌春正月淸和會四方耆宿手自爲書付師嗣主教席師度不能辭乃受之三月赴闕以教門事條奏首及終南山靈虛觀係重陽祖師鍊眞開化之地得旨改稱重陽宮敕洞眞于君住持主領陜右教事以白雲綦公無欲李公輔翼之大行營建乙巳奏請河東永樂純陽祠宇及師眞堂下並賜宮額以彰玄化丙午定宗皇帝卽位詔師以戊申上元日就長春宮設普天大醮仍降璽書凡名山大川諸大宮觀及玄門有道之士委師就給師德名號𡻕舍辛亥憲宗皇帝嗣登寶位欲遵祀典徧祭嶽瀆秋八月遣中使詔師至闕下上端拱御榻親緘信香冥心注禱於祀所賜師金符寶誥及內府白金五千兩以充其費師奉旨驛車南下徧詣嶽瀆以行祀事越明年春正月初吉來終南祖庭敬展精衷恭行祀禮規度營建整治玄綱凡山下仙宮道觀皆爲一到建功師德賜賚各有差以是地係教門根本故也至四月旣望仙仗東歸由中條之純陽宮亦如終南故事秋九月還燕癸丑冬十月聖天子在藩邸開府上都命師修金籙大齋作大宗師普度隨路道士女冠給授戒牒甲寅春正月上遣使就宮會集諸路高道作普天醮敕師濟度海內亡魂賜黃金五百兩白金五千兩凡龍璧環鈕鎮信之物焚獻香燈並從官給自啟事至滿散鸞鶴五雲之瑞不可殫紀秋聞亳社戍兵師遣道人石志堅輩興復太清宮乙卯秋七月見上於行宮適西域進方物時太子諸王就宴敕師預焉十有二月朔旦上謂師曰朕欲天下百姓安生樂業然與我同此心者未得其人何如師奏曰自古聖君有愛民之心則才德之士必應誠而至因厯舉勳賢並用上嘉納之自午刻入承顧問及燈乃退丙辰春正月以老辭夏四月至自北庭六月庚申朔師倦於應接謝絕人事隱几不言戊寅正襟危坐語左右曰昨夜境界異常吾自知卦數已盡歸其時矣主領後事向已奏誠明張志敬受代餘無可議者翌日乃留頌順正而化春秋六十有四葬於五華山之存存堂平昔著述有又玄集二十卷行於世中統辛酉秋九月制書超贈眞常上德宣教眞人號師諱善慶字伯祥甯海人漢廷尉高門于公之後祖彥升嘗主好畤縣薄考珍韜光不仕師以大定六年丙戌十二月初八日生幼不茹葷長通經史雅嗜道德性命之學與丹陽宗師同里閈二十二年壬寅夏五月丹陽自陜右還鄕中演道於金蓮堂老稚雲集師與焉時年十七丰神整秀丹陽見而問之知爲彥升之孫歎曰吾向畏重陽譴訶頗萌倦弛然得以終其業者彥升輔贊之功居多使是兒入道以報乃祖之德可乎翌日師與眾再至丹陽神出一熟芋與之師拜而食其父母聽執几杖以侍左右乃蒙授以今之名字旣而父珍與其室王氏謀曰吾止是兒蒸嘗所系今丹陽化度入道殆夙契乎丹陽嘗業儒必不妄絕吾于氏之祀其修眞之門量有超出世法之外者我輩區區尚何所戀遂與女子洎家人輩俱受業於丹陽之門丹陽訓珍法諱曰道濟王氏曰道淸及號玉谿散人女曰妙靜卽師之姊也後俱爲玄門之宿德再年癸卯冬師從丹陽赴萊陽游仙觀醮未幾丹陽上仙長生玉陽二宗師來主喪事嘗聞丹陽有報德彥升語乃授師道門儀範命宋崇福相將入關俾事長春宗師以遠鄕土親愛之情師受教而西至終南祖庭拜謁靈陽李君備陳長生玉陽之命靈陽見師天姿雅澹舉措不凡教之棲山林遠鄽市親有道種福田且使枉道詣平涼參高士崔羊頭師承命而往一夕宿回山王母宮夜夢老媪持餅一槃餉鬅頭道者道者卽取一餅擘半與師食仍自食其半又二日達平涼崔菴參禮甫畢俄一媪持餅一槃來饋於崔其崔與媪克肖夢中之見崔取一餅擘半與師食卽自食其半且曰連前夜者食吾一餅矣時趙九古侍側崔指師曰是子可教其有道緣乎居踰月多蒙指授遂辭詣隴州龍門山侍長春恭執汲爨乙巳春長春命師詣洛陽致書於長眞宗師長眞訓以推强挫銳鍛鍊塵心爲學道之要無何長眞返眞師葬祭禮竟復入關匄食同華間行其所受丙午長春下隴山振教祖庭召師席下令日服勤勞以結勝緣先長春游隴川日愛汧陽縣東之石門嘉勝築全眞堂命弟子蒲察道淵居之明昌辛亥長春將歸海上謂師曰汝緣在斯無他往人需友以成友不可不擇蒲察道淵者心存至道是人必能輔成爾業可往居之師詣呉嶽五峯山鑿石以處日止一餐晝夜不寐者七年惟道是力乃臻於妙凡未然之事必預知之隴人迄今目其龕曰于眞人洞塑像事之蒲察請師下山同處承安戊午郡之好事者輸貲搆造揭玉清觀額尋禮玉陽參受經籙以輔道救物遠近益加崇敬太和癸亥隴州牧保賜沖虛大師號五年乙丑復往棲霞觀長春請進上道無何長春遂促西歸至臨沂遇玉陽於縣廨玉陽首問關中日與甚人爲友師以蒲察告玉陽再問蒲察入道之由師吿以奉長春命玉陽曰審若是則可與友矣遂蒙教以微旨及授洞眞子號居數日乃別道過林慮愛其幽閴棲止於天平觀丙寅長春介畢知常持教帖云大抵上根之人惟財色是遠汝旣能推財讓義何必深山窮谷守靜篤也草字到日卽便下山復還汧隴目今教門闕少得力人要汝弘闡爾仍更名志道師拜命還秦八年戊辰南征凱還憫其俘縶購援者甚多師自五峯卒業以來詣門求度爲道士者數百人俱立觀院於鳳翔汧隴之間元光癸未汴梁中太一宮提點李沖虛舉以自代不起正大改元上悼西軍戰沒詔遣禮部尚書趙公秉文醮祭於平涼延師爲濟度醮竟師以所奉信幣悉具呈回納助軍須之用趙素重師高潔圖像薦諸朝遣使召之又不起已而隴山兵亂畢知常請師詣岐山五姓之洞眞觀居環堵丙戌遣中使再召起而應之至京之日奉旨提點中太一宮若密國公璹侯莘公摯楊尚書雲翼許司諫古馮內翰璧諸相貴近爭相景慕時金運將終徭役叢出民大不堪徵及道釋師每於執政者方便啟導屨寢其議四方緇黃多賴以安丁亥北來道眾傳長春升仙於燕山師日惟一飯心喪者三年庚寅河南旱詔近侍護師禱於濟瀆上期望祀於宮中醮竟立致甘澍特旨襃異令兼領五嶽佑神觀事是秋書大有年天興癸巳春汴京納款聖朝遣使訪三教人以師爲之冠秋七月由中欒北渡時依附者眾舟人疑有金帛薄暮啟船遇一沙渚紿以達岸委之而去黎明驚濤四涌莫不倉惶失措師泰然無懼色是日會八柳樹堤潰水勢南下命弟子符道淸濟賂二舟舉脫其戹於是挈眾達大名玄通范圓曦時主東平上淸宮聞師至率在府僚屬道眾備車騎來迎虛席引避師辭不得已乃弘教於東原乙未秋上燕都謁長春處順堂燕人懇留不獲南歸丙申夏燕境蝗旱大作行臺諸官禱師禳祭師俯徇輿情啟醮卽雨蝗不爲災秋清和眞人尹君自關中還燕命眞常李君權教築室於西院與師對處日相陪佚戊戌春眞常嗣掌教事夏四月朝廷選試道釋以師聞望隆重進號通玄廣德洞眞眞人適北京留守烏德亨築全眞觀邀師矜式其國人勉應而行秋七月眞常奏請得旨改終南靈虛觀爲重陽宮敕師住持主領陜右教門事庚子夏太傳移剌寶儉京兆總管田德燦差官持疏往邀卽日命駕烏公以下僚庶以師興復祖庭之故知不可留饋金贐幣者充積過燕涉趙度晉來秦所至之方諸侯郊迎士庶嚮慕以所得之貲悉爲興建之費辛丑春正月會諸路師德葬祖師於白雲殿時關輔甫綏民稀土曠門下道流共念祖師開化之德競來入關營佃方所爲之羽翼東連海岱西徹鞏洮南際江淮北通沙漠往還道俗奉香送供者絡繹不絕與李宮作務之眾恒不下數千人賴師道德高厚每至朔望必設齋集眾教以修身養性爲功立觀度人爲行及諭以罪福之理俾各從所便故得循規蹈矩教門甯謐不十載間雄宮傑觀星羅碁布於三秦之分矣其祖庭制度爲海內琳宮之冠師以甘河祖師遇眞之地建遇仙宮以彰靈跡又於西虢磻谿長春鍊化之所分命門人千指剙長春成道宮以報教育之德夾谷先鋒使於祖庭作功德主建虛皇壇殿以甲辰上元日請師設羅天大醮薦悼海內亡魂以落成之適皇子闊端大王開府西涼遣使趙崇簡就宮修金籙醮七晝夜方降聖之際北東二方眞文無火自化使回啟其靈異王特降璽書護持玄教仍增以重陽萬壽宮額賜與醮五師以眞人號謂師與宋披雲薛太霞綦白雲李無欲也夏五月聖旨遣近使裴天民詣宮行降御香特加優遇丙午秋鞏昌總帥汪德臣欲請師作醮薦父靈儀慮其不能動啟於王府以汪侯開國大臣遂命丞相完顏鳳哥敬詣終南禮請師卽應之鞏昌地接西羌居民但習浮屠之教師以無爲清靜正心誠意之道化之風俗爲之一變冬演教秦亭應緣接物之迹秦士有西州錄丁未春還宮秋八月皇太后賜以冠服仍頒寶誥敕守臣外護玄化無令擾瀆庚戌夏六月通明閣吿成師拽杖逍遙其下曰吾焚修祖庭經營是閣僅十年今始見成就豈徒以誇其壯麗爲哉蓋常人之情見其嚴飾乎外者而儼敬之心油然而生乎內夫上達之士以淸靜無事絕慮修身者固不在是其於弘教度人此象設崇構之緣亦不可偏廢教之所以崇道之以所尊也冬十月三日沐浴正襟危坐召眾於前囑以修進之語日方卓午留頌而逝於眾妙堂春秋八十有五醮祭九日顏采如生遠近道俗執紼奉賻者數萬人葬於宮之仙蛻園附玉蟾靈陽二師之側度人暢道詩詞目曰洪鍾集行於世故翰林待制孟攀鱗作文率長安士人特來祖庭致祭河南轉運使楊奐爲作道行碑至元戊寅𡻕於白雲殿後建思眞堂設像以事香火矣師姓宋諱德方字廣道萊州掖城人先世以積善見稱其初生之夕里人見其家祥光照徹比日卽大定癸卯𡻕八月一日也時人遂異之僅能言便好讀書不爲童稺嬉戲事穎悟强記識者謂是夙性薰習故在年十二問其母曰人有死可得免乎母曰汝問神仙劉眞人去時長生劉宗師闡教於武官於是師明日徑往長生一見愛其骨格淸秀音吐不凡留侍几杖因於灑掃應對之間就憤悱鬱積之地投以正法而啟發之師旣得指授朝夕充養未始少息後得度於玉陽占道士籍迨長生仙去事長春宗師於棲霞儒經道典如易老中庸大學莊列等書尤所酷好外雖詩書子史亦罔不涉蠟於中采其窮理盡性之學涵泳踐履濳通默識光明洞達動與之會其日新之美固已不可掩矣庚辰春正月大元太祖聖武皇帝遣近侍劉仲祿起長春於東海之濱選其可與侍行者一十八人師其一也往復三載還燕住長春宮是時從長春之眾皆躬勤勞師獨泰然以琴書自娛有評之於長春者長春拒之曰汝等勿呶呶斯人已後扶宗翊教之事業汝等皆不可及長春亦嘗私謂師曰汝緣當在西南師因語及道經泯滅宜爲恢復之事長春曰兹事體甚大我則不暇兼冥冥中自有主之者他日爾當任之仍授以披雲子號及長春羽化淸和嗣典教事令師提點教門一舉一動無偏私而有規制內外道流莫不心服癸巳大丞相胡夭祿時行臺河東請主醮事甲午游太原西山得古昊天觀故址有二石洞皆道像儼存壁間有宋童二字師修葺三年殿閣崢嶸金碧丹臒如鼇頭突出一洞天也丁酉復主平陽醮事因於玄都觀思及長春向日堂下燕閒之際有曰藏經大事我則不暇他日汝其任之又曰汝緣當在西南之語乃私自念云吾師長春君以神化天運之力發而爲前知之妙凡有言之於其先莫不驗之於其後謂緣在西南之語我已安而踐之矣何獨至於藏經而疑焉遂與門下講師通眞子秦志安等謀爲鋟木流布之計丞相胡公聞而悅之傾白金千兩以爲剙始之費卽授之通眞子令於平陽玄都觀總其事至事成之日曾不愆於素故翰林學士李冶所作碑文從倡始而至畢乎靡不備錄讀之見其補完亡缺搜羅遺逸而海內數萬里皆經親厯之地使他人處之縱不爲煩冘所困則必厭其勞矣師猶假餘力卽萊州神山開九陽洞及建立宮觀自燕至秦晉几四十餘區辛丑春正月會葬重陽祖師於終南癸卯自甘棠來永樂鎮拜謁於純陽祠下見其荒蕪狹隘師乃招集道眾住持後雖掌教眞常李君奏請朝命大行興建者師實爲之張本甲辰春來終南祖庭應皇子闊端大王醮事醮竟例賜玄都至道眞人號是時藏經勝緣俱已斷乎卽閒居於雪堂日與耆年宿德相會談道至丁未冬十月十有一日沐浴更衣示微疾而逝於所居之待鶴亭春秋六十有五越七日葬於宮之仙蛻園平生所作詩文目曰樂全前後二集行於世戊申冬門人遷仙柩於河東永樂鎮純陽宮葬之建祠立碑以事香火至元庚午𡻕春三月聖旨追贈玄通弘教披雲眞人號師姓綦氏名志遠字子玄世爲萊州掖縣巨族祖德中父遵皆雅志田園以陰德見稱於鄕里皇統間餓莩滿野其家設粥以濟至秋成乃止大定己丑重陽祖師挈丹陽長眞長春三師過其門嘗邀至家修齋供奉後於鄕里剙龍翔觀朝夕香火以奉上眞割膏腴田施充常住以贍雲衆當明昌庚戌正月十九日師乃生幼不戲狎年志學使之讀書師曰所願學者方外修眞之業弱冠之𡻕父母欲議婚師聞之潛於靜室自潔其身家人知其志不可奪卽令披道士服旣而往棲霞參長春宗師服勤久之於道有所得無幾何從長春居萊州昊天觀己卯𡻕太祖聖武皇帝遣使持詔起長春游北闕明年春正月啟途選從者一十八人師預其一也霜眠露寢往復三載道路艱辛備嘗之矣回達金山之巓林間少憩長春顧謂淸和尹公曰綦生賦性淳謹將來吾教可勝大用甲申長春還燕都住長春宮師服勤愈謹迨長春上仙清和嗣主教席俾師知長春宮事仍賜白雲子號旣而委之行化山東迎迓者不輟師以善言勸諭四方耆宿奉幣堂下者不可勝計戊戌春眞常李君嗣掌教事夏四月入覲天廷以師從行秋七月眞常奏請得旨命師同洞眞于君住持終南山重陽宮提點陜右教事還燕清和謂師曰昔長春金山之語今其時矣汝當克勤乃事無怠師謝而西來庚子率京兆僚屬復上燕都禮請淸和主重陽祖師葬事厥後祖庭興修師多所規畫仍於京兆府城玄都萬壽宮及炭谷太一宮俱加營建甲辰上元日皇子闊端大王遣使趙崇簡就宮修金籙醮七晝宵使回啟陳靈異王特降旨護持玄教洎預醮五師俱賜徽號例授玄門弘教白雲眞人丙午冬皇太后賜以黃金冠服特加優遇辛亥憲宗皇帝嗣登大寶頒降聖旨敕師典領陜右道門如故壬子冬是時西蜀未全歸附一妄人誣吿道眾與蜀人相通有司率兵大加按治道眾駭散明年夏四月聖天子在藩邸行宮六盤師往謁見以實哀訴蒙降璽書撫慰始安度門弟子數百人建立宮觀二十餘所至乙卯秋七月二十四日示微疾而逝於玄都之丈室春秋六十有六初瘞於樊川白雲觀後改葬於劉蔣祖庭之仙蛻園矣師家世耀州之美原姓李氏名志遠道號無欲子以大定己丑𡻕十二月初十日生五𡻕始能行及長慷慨特達毅然以正直自負鄕里有狡獪者每正辭折之望而畏服嘗肆意酒間視此世爲不足玩年三十七乃曰與其汨沒塵坌中曷若徜徉方外邪時碧虛楊君大暢全眞教法於長安乃往見之碧虛識爲玄門重器然天屬所繫度其有難解於心者且使還家但勉以積善而已師歸遂與諸親友決棄妻子而去其妻訕之笑而不顧其父見而呵責師婉辭吿以性命之學父乃悟偕受業於碧虛之門師蓬首弊衣行匄於市時人以酒李先生呼之日用間以修身利物爲己任大安庚午秦境大旱餓莩者相枕藉邑人趙三郎富甲鄕里師以善言誘導趙悟乃發廪粟師令法弟齊志道輩春爨以給貧病至秋斂而罷已而入興平環居千日乃得大妙適河渠使夾谷公請主縣南龍祥觀師應之居及五稔遷居樓觀又遷京兆之丹霞無何碧虛俾營三原之碧虛觀正大戊子碧虛嗣教於師而逝未幾關中受兵師挈眾避亂於南山至庚寅春達南陽會沖虛李君洞眞于君在汴聞之遣人持書請至住丹陽觀癸巳汴京納款城中絕糧人爭北渡師繼達汲郡因以陰騭開諭津人創靈虛天慶二觀以濟南來之眾明年適燕時清和尹君掌教委師入秦興復祖庭授以提點陜西道門之職啟行之初贐黃金一笏以爲創始之貲過趙過魏公侯郊迎饋財幣者不可勝計悉歸祖庭興建之用京兆總管田德燦督佐官就河中相迓以府城估德觀居之時關中甫定暴恨相煽劉蔣之側了無人跡師率眾懇築以創其業辛丑春會葬祖師之際多所規畫壬寅秦士議修文廟闕瓦師盡給之士皆歎服甲辰春皇子闊端大王遣使就宮修金籙醮七晝宵事竟例賜無欲觀妙眞人號秋渭北萬戸郝公臧獲數十陰謀南遁得其顯狀盡欲刑之師連夜馳至以罪福之理曉勸皆免明年京兆羣小結連私逸府尹韓淵議尸諸市以令眾感師一言但殲厥渠魁太傅移刺寶儉其母死欲以二婢爲殉師以古葬禮正之始革其弊丙午詣燕注香堂下夏四月回車過汴寓丹陽觀坐中若有急色介諸徒速出甫離一舍宋軍已至城下其先見類如此明年秋八月中宮賜冠服之寵甲寅春掌教眞常李君以普天醮事具書召師時年八十有六不敢以老耄辭比至燕疾篤以六月二十六日於長春宮方壺翛然而逝門人捧柩西歸葬於劉蔣之仙蛻園師生平雖不讀書四方衣冠之士相待甚厚在燕則主萬慶淡游趙復仁甫敬鉉鼎臣在秦則紫陽楊奐姚左轄樞來獻臣明之邳郎中邦用輩皆挽之以詩及作文致祭刻石於佑德之靜復堂讀之平日道業自可見矣師姓高氏諱道寬字裕之世爲應州懷仁縣之豪族質貌魁偉襟度夷曠以明昌乙卯𡻕七月十九日生幼不同羣兒戲狎旣長讀書通經史大義性尚雅淡每有出塵遠引之思以二親在堂莫遂其志及大安兵興雲應當其衝卽挈家避地居長安隱身爲刀筆吏旣而考妣俱下世喪祭如禮一夕露坐家庭夜將半忽覩光明如晝仰視西北天門大闢紅霞翠靄之間瓊林琪樹寶殿瑤臺厯厯具見須臾復闔自是學道之心益切興定辛巳聞章臺街蓬萊菴全眞安君有道卽捐家棄累執弟子禮安君愛其勇決教以摧强挫銳寡欲治心爲修身之本師佩服玄訓弊衣糲食味道思眞晏如也正大改元游汴梁依丹陽觀沖虛李君參進上道沖虛俾服勤勞以資福德師躬執爨汲之役數年不怠沖虛授之道要丙戌金主遣中使詣鳳翔徵洞眞于君仍命李沖虛選精嚴道人一員副行沖虛召師前曰師資契遇實關冥理洞眞吾方外友昔嘗蒙丹陽長春二師眞印可眞玄門之宗匠今上命有請汝可偕往他日興起吾道作成爾業者其斯人歟敬之哉師受教而行洞眞旣至汴奉命提點中太一宮師居席下朝叩夕請其於道德性命之學有所進癸巳汴京下師乃北渡上燕都尋居德興之龍陽觀頤神毓浩若將終身焉戊戌春洞眞召還燕從演教白霫庚子冬又從入關興復終南祖庭是時經營會葬祖師之際師多方化導裨贊其用戊申洞眞賜號圓明子署知重陽萬壽宮及提點甘河遇仙宮事且語之曰人徒知枯坐息思爲進道之功殊不知上達之士圓通定慧體用並修即動而靜雖攖而甯爲無爲事無事同塵和光此老氏之微旨也今玄化盛興汝當奉此應緣扶教接物利生以爲登眞達道之基汝後必負教門重任事雖稠疊慎無憚是皆庸玉汝於成也師叩頭跪進曰仙眞妙旨實非凡俗所聞今日見教請事斯語由是儉以治身寬以莅眾不數載內外道眾莫不得其歡心識者嘆服以洞眞爲知人壬子春掌教眞常李君祀香祖庭俾師充京兆路道錄從事十年事有成而無替迨中統辛酉誠明眞人張君詣闕保奏宣授陜西興元等路道教提點兼鎮重陽萬壽宮事至元戊辰夏皇姪永昌王賜金冠錦服辛未嗣教眞人純眞王君贈號知常抱德圓明尊師未幾永昌王再賜洞觀普濟圓明眞人號癸酉春皇子安西王開府六盤師一見應對稱旨荐賜冠服乙亥夏召師就行宮修金籙羅天大醮自將事之日迄於筵終瑞雲十圍靈應昭著備見於參政商君所作投龍冊碑兹不贅述無幾何中宮又以冠服見賜寵諭優渥丙子秋七月安西王頒降璽書益以西蜀道教併付掌管師典領教門踰二十年專尚德化未嘗一施政刑在祖庭則繼剙南昌上宮洎五祖大殿其餘府庫藏廐增葺者甚多雖一稺子參請亦必以禮相接未嘗有自得驕慢之色形於顏間教事繁劇物來卽應皆曲中其理每至夜分澄神靜坐達旦不寐其修眞鍊養之功習以爲常以是年踰八旬步履康强精神充懌上而王公下迨黎庶莫不待以殊禮故得教門靜肅道眾乂安四方陰受其賜者爲不少丁丑春正月上旬忽得微疾侍者勸進藥師曰死生如旦暮乃物之常理奚藥石可延分外之筭邪至二十四日遂不食終日危坐談話如平昔但教人以進道之語翌日奄然順化於所居之靜室享春秋八十有三越五日葬於宮之仙蛻園送葬道俗踰萬人其平生道力自可見矣
