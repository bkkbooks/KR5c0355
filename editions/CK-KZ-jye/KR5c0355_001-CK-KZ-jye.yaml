front:
  text: 道藏輯要夷山天樂道人李道謙編
  hash: sha256:889c27ff2f8c22993ea00a1b10ad061ee1cd4405c0de416258898ea7f21afbc7
  markers:
  - {type: head, offset: 4, content: 終南山祖庭仙眞內傳, id: KR5c0355_CK-KZ-jye_001-h1, level: 1}
body:
  text: 師姓和氏名德瑾秦州甘泉縣人天姿整秀志學之𡻕攻事翰墨及冠隱身爲刀筆吏然處事中正以道存心未嘗取非義財遇高人勝士靡不參請天德間以部椽出身方將游仕宦途忽一道者過門師延至家酌酒談玄大適其意少焉而去他日道者復至臂擎一梟謂師曰此物雖許大眼了不識人師乃悟爲異人因問其鄉里姓字不吿而往後月餘道者復來身染厲疾止於其家膿血汙穢殆不可近師爲召醫百療不效經𡻕乃殂師備禮葬之又數月一老媪詣門泣且告曰老身有兒性嗜雲水不事家業近知游居貴宅特來相尋師吿以病殂媪慟哭不已曰老身與兒止是二口兒今旣死何所託身師請以母禮事之一日媪曰吾欲啟壙一覩兒面雖死無憾懇告再四師爲發塚但空棺而已中有祕旨一幅老媪亦失所在師嘆曰吾今遇眞仙尚汨沒塵坌中果何爲也由是黜妻棄子易衣入道時聞重陽祖師亦遇眞居終南乃往參同大定三年於劉蔣村結茅與靈陽李公三人同處旣而心地圓通大得其妙七年丁亥重陽東游海上師與靈陽共居暢道十年庚寅春馬譚劉邱四眞將至師及李靈陽時寓終南太平宫留錢於貨羹之家謂曰今日當有邱劉譚馬四仙客至可善待之良久四人果至貨羹人邀之曰公輩豈非邱劉譚馬邪四人相視而笑曰汝何由知之曰和李二師已留羹錢矣四子嘆異食畢往見忻然相得師嘗命畫工寫眞凭虎而睡眾莫能曉秋九月初師忽覺道體違和丹陽命長春侍疾至十四日翛然順化四子葬於劉蔣菴側畫凭虎睡者乃預表歸期在寅年也升仙之後有臨潼張公久患風疾眾醫莫效將屬纊之際夢師至門告以治療之方問其姓名曰吾終南和玉蟾也覺而其疾少愈用其所告之劑疾果頓差張就菴設齋建亭以酬其惠諡曰玉蟾普明澄寂眞人今祖庭石刻尚在師姓李氏京兆終南縣人聰明特達學問淹該天德間遇異人點化自是落魄不問家事視富貴若浮雲遠名利如桎梏徜徉泉石以道自樂韜光晦迹素厭人知故終身不吿人名字里人但以李眞人呼之至大定三年與重陽祖師洎玉蟾和公同結茅於劉蔣居之其於鉛汞龍虎之學多賴重陽指授七年丁亥夏重陽東游海上師與和公止居劉蔣修身接物重陽至汴寄之以詩云傳語和公與李公首先一志三人同其爲交契可知矣迨十年春重陽升仙於汴梁邱劉譚馬四眞入關待二師以叔禮是年秋玉蟾亦假化師與眾眞同處二十八年春正月長春邱君奉詔赴闕拜別之際師囑曰重陽謂汝必能大開玄教今其時矣萬一善自保愛來春鶴馭早還吾專俟汝爲喪主秋八月長春得旨還終南是冬盤桓山陽淮洛之間明年春二月西歸過鄠郊秦渡鎮道眾請留數日先旬日前師無恙絕粒不食眾問之曰汝輩無慮吾惟待喪主而已卽遣人促長春亟歸旣至拜於榻前卽賜之墨長春悟其旨命匠造棺未及成師已順化時三月初一日也長春以禮葬於菴側之仙塋敬諡曰靈陽輝耀演化眞人先生姓劉氏諱通微字悅道默然子道號也東萊掖城人世爲鄕里右族倜儻不羈在弱冠間飛鷹走犬博奕鬭雞迷於花酒之場一旦染奇疾幾至不救夢入仙家之境已而平復遂悟幻化之理以道存心大定丁亥夏重陽祖師將游海上道過掖城見先生神情爽邁有飛舉雲霄之態與之同話機緣契合授以修眞祕旨及今名號先生旣得印可卽棄家長往杖筴入關中結茅於終南山甘谷之側吟風嘯月枕石潄流放懷塵世之外庚寅春邱劉譚馬四師西來先生相得甚歡同葺劉蔣菴居之旣而四師復詣汴梁負祖師仙蛻歸葬於菴側先生廬墓三年北游嵐管內全道妙外應世緣摳衣請教者日不虛席於是立觀度人玄風大振於西山矣嘉聲遠播名達皇都明昌初道陵召至闕下問以九還七返之事先生曰此山林野人所尚陛下居九五之位四海生民之主不必留意於此但對以黃老淸靜無爲修身治國之要上悅敕館於天長觀尋遷永壽道院開堂演道三教九流請益問話者戸外屨滿未幾得旨還山賜御書以寵其行翱翔於齊魯間至埭州商河縣聶家莊謂門人曰此吾歸休之所也因葺治廬舍居之一日焚香禮聖集眾囑以修眞之語曰師眞有閬風之召吾當歸矣奄然假化卽承安元年二月十五日貞元節也平生所作詩詞目曰全道集行於世仙化之所今大建朝元宫矣先生家世乾州醴泉姓史氏名公密初自垂髫心慕至道大定壬午𡻕聞重陽祖師遇仙受祕訣養道於終南時走而請盟遂蒙允納教以全眞性命之學仍訓名處厚號洞陽子自是乞食鍊心往來於終南鄠社間七年丁亥春重陽將游東海欲令侍行先生辭以母老不敢遠游重陽遂畫三髻道者立於雲中傍有一松一鶴付之曰謹祕藏之此爲他日參同之符及庚寅春重陽仙化於汴梁丹陽宗師率三友入關至長安孔仙菴先生徑往參謁時丹陽初頂三髻先生出示重陽向日所留畫圖大爲讚異四師吿以海上開化汴梁升仙之事遞相印可相得甚歡卽與四師同葺劉蔣菴居之丹陽屢以詩詞訓吿次第誘掖不數載間克臻大妙後復還醴泉和光玩世不拘禮法時人以史風子呼之忽歌舞於市唯云歸去蓬莊眾俗莫曉如是者三日徑來菴中奄然蟬蛻時甲午六月十五日也官僚士庶靡不瞻拜初葬醴泉明年丹陽移葬於劉蔣之仙塋開棺視之顏采如生丹陽以四言讚之云史公得遇得遇重陽重陽傳授傳授玄黃玄黃至理至理不忘內持修鍊外絕炎涼水火旣濟日月交光龍吟離位虎嘯坎房木金間隔姹女圓方刀圭爛飲知味聞香神丹結正晃耀晶陽風仙來度顯出嘉祥歌舞三日辭別街坊惟云歸去趨赴蓬莊復入菴內奄然坐亡觀者雲集事理匪常一靈眞性班列仙行先生道業讀此讚文自可見矣享年七十有三中統癸亥再遷仙塋開壙視之僅及百年骨雖散亂其色如金其堅若石余所親見者也異哉先生姓嚴氏名處常號長淸子京兆櫟陽縣人卽重陽祖師之外戚幼習儒志尚清虛以父母在堂未能高蹈物表爲縣法司臨事慈愍一日向暮還家路拾遺書一卷題曰玉靈聖書得之者仙於是焚香祝曰我今二十有九誓於不惑之年潔身入道祝畢酹酒於醮盆中有聲隱隱若雷家人咸以爲異後踰一紀二親俱喪忽患目疾治之愈甚默自責曰昔得聖書誓以四十出家今過期矣此疾稍痊即當從道無何目明如故遂往終南劉蔣參重陽祖師願受教爲門弟子時大定癸未𡻕也先生旣蒙允納克志于道數年祖師授以微旨七年丁亥夏祖師東游先生遨游終南泉石住處頤神毓浩十年春丘劉譚馬四師入關蒙丹陽宗師復爲印可仍贈之楊柳枝詞云一虎一龍一處眠打盤旋一呼一吸一周天徧三田一麥一麻通一線裊祥煙一來一往一還元產胎仙先生拜受自是了無疑障居祖庭又逾十載道契眞常以二十三年癸卯夏四月八日焚香辭眾無疾而逝春秋七十三矣先生姓姚氏諱玹號雲陽子終南蔣夏村人世爲鄕里巨族父祖俱好賑贍貧乏多積陰德乃生先生丰神灑落超然挺出塵之姿性甚仁慈聞人有急必往援救與重陽祖師有緦麻之親大定丁亥四月重陽詣門告别先生問將安往重陽吿欲游海上邱劉譚中捉馬之行先生素以害風相待笑而別無何重陽自汴京爲先生寄藏頭拆字詩一章云前相識二官人你眞靈看好因抵芝苗公未識成道果次須屯蒙卦聚神來祐左源通氣轉新斧若磨交利快頭一點遇長春不數年丹陽輩來居劉蔣菴先生所居相去數里聞之往詢其始末見邱劉譚馬四師皆凌雲仙客愕然歎曰向重陽告別之語今果驗矣我輩常以害風待何愚之甚邪由斯頓悟乃棄家捐累乞受道於丹陽宗師丹陽教以修眞奧旨及賜今名號仍贈之詩云灰心忘富貴槁體樂清貧甘作逍遥客長爲自在人氣中須養氣神內更頤神不著纖毫假方能得至眞恭侍左右多所傳授先生得法之後目不交睫脅不占席十有餘年深入大妙壬寅丹陽東歸甯海先生從行迨丹陽上仙先生游厯磁相間愛滏陽風俗淳厚築白雲菴居之隨機接物演化度人一日謂眾言曰師眞有命吾其歸乎於是沐浴更衣跏趺而坐日方卓午寂爾返眞異香芬馥移時而散享年七十二平生所述詩詞號破迷集行於世先生姓曹諱瑱道號朝虛子陜右坊州人家世鉅富猶子徽美叔早登甲第先生少讀書鄕里以孝悌稱爲人忠厚謙和襟懷蕭爽壯𡻕游場屋間屢中高選大定甲午暇日因覽仙經道典掩卷歎曰人生浮世光陰電回倏然而已不究生前妙本出世高標果何爲哉雖有學仙之志罔知所適聞丹陽宗師於終南祖庭居環堵先生徑往參謁一見神合氣協若有夙習之契丹陽納諸門下教以道要先生旣蒙接引心知至人不易遇也遂捐進取心以永依歸丹陽知先生逸氣超邁妙識高明一日因先生靜室澄坐思造乎靜丹陽詣之曰學進歟先生稽首而跪乎前曰學欲進而未之能也丹陽曰夫靜也者天命之原仙聖之本習而進之猶假翰以登天反思而究則如坐堂上而覩階前也不曰靜乎攖而不煩不曰眞乎作而不妄先生拜而謝曰瑱得之矣自信而不疑自明而不昧自古自今繩繩而不絕者其斯之謂歟丹陽乃首肯瑱再拜而退後得玄門十解元者自先生始也凡初入道者丹陽以先生爲兄壬寅丹陽東歸甯海先生侍行明年丹陽羽化先生代師行化海上明昌中與雲中蘇公無染柳公奉長春師叔命同飛舄燕薊演化度人應緣接物十有餘年玄化大行於泰和丁卯夏四月先生時寓燕都城東永壽觀忽吿眾曰吾當歸矣不數日示微疾而逝道眾具禮葬之觀東兵後乙巳冬改葬於五華山庚戌𡻕十二月奉朝命追贈翊玄惠正朝虛眞人號蓋掌教眞常眞人請之也先生世爲京兆右族姓來氏諱靈玉道號眞陽子幼習儒業鄕里以解元呼之大定十年間禮丹陽宗師出家迨丹陽東歸海上先生侍行嗣後事跡無所可考姑略紀其大槩他日得之當爲詳錄先生姓雷氏名大通道號洪陽子世爲延安敷政之巨族身長六尺情懷雅淡不事小節眉疎目秀耳大準直脣如渥丹鬚髯美細幼業儒素嘗以詞賦魁鄕選故時人以解元稱之當大定乙未春方夜讀書燈下月朗風淸欲竟三鼓忽聞窗外以杖畫地聲旣而言曰可歎愚迷謾用功浮華一夢轉頭空何如立志修仙舉永住三山最上宫先生劇啟戸出觀了無所見秉燭視之見以杖畫向詩四句後畫嵓翁二字先生自是了悟空華頓悱學仙之志是𡻕秋因赴試長安聞終南祖庭有丹陽宗師闡全眞教法卽往謁之一見若有夙契乃作詩二絕寫懷以呈宗師卽繼韻答之云饒君聲價勝蘇秦不似韜光更匿名物外逍遙眞坦蕩亘初一點自然明靜淸便是長生訣捨棄妻男沒口傳悟後知空甯著有自然獲得好因緣先生焚香拜請願執弟子禮宗師留於座下訓以今之名號朝叩夕請於道大有所得壬寅夏丹陽東歸先生留居祖庭日進道業甲辰春聞丹陽上仙杖屨游海上奠祭墳壠迨明昌初迤邐西來道過滕郡愛嶧山巖壑幽邃築修眞菴於響石澗棲眞養浩演化度人厥後詣門受教爲門弟子者數百人惟靈眞子馬了道淸明子王志專爲入室今各建方所引接後進至大安辛未秋先生謂門人曰百六數窮劫災斯至生靈魚肉吾不忍處世也無幾何示微疾而逝門人葬於修眞菴側未幾兵甲擾攘烽煙澒洞後至大元撫定人煙稍集𡻕庚戌先生之高弟淸虛眞人張志洞至自武川覩先生宅兆卑隘封樹草略卽會四方法屬備衣衾石槨大行改葬於雪山仙塋靈都宫以弟子馬靈眞王淸明祔於左右仍搆堂設像以事香火先生姓劉氏諱眞一道號朗然子世爲登州黃縣之巨室父祖以儒學起家積德奉道鄕里所稱先生幼喪其父讀書日記數千言辭源浩瀚弱冠間試藝春官得占高甲時人以解元呼之然每以世事爲不足玩常有淩雲邁往之志忽得泄瀉之疾纏滯彌年已及膏盲百療不效大定己丑秋重陽祖師挈丹陽長眞長春三眞過其門母氏設齋供養之且以子疾吿祖師視之曰此吾門大士非汝家子也許之入道則可矣母氏焚香跪於前曰此疾果愈俾侍几杖以從祖師以餘飲與之旣飲汗出如洗厥疾漸瘳迨明年祖師已升仙於汴梁先生入關詣終南劉蔣村禮丹陽宗師出家奉侍旣久得付玄旨壬寅夏從丹陽東歸癸卯冬丹陽將羽化召先生囑之曰汝等要作神仙須要積功累行縱遇千魔萬難慎勿退墮然後可領吾言我開眼也見瞑目也見元來不在眼但心中了然則無所不見矣又曰汝緣在北方可往矣先生拜而謝丹陽旣升仙迤邐北游平灤之境所至請益者戸外屨滿一日至撫甯縣愛其山水佳勝築重陽觀居之厥後度門眾數千餘輩刱宫觀大小僅三百區北方道風洪暢先生闡揚之力居多至泰和丙寅𡻕二月初六日召入室弟子邸道明等曰吾其歸矣昔丹陽將升仙囑予進道之語汝輩當無忘金玉集凡入道者不可不觀爲我鏤梓散於多方可也須臾翛然假化平昔所作歌詩目曰應緣集行於世矣先生姓李氏世爲平涼府華亭縣之大族幼習儒業長於辭翰早年嘗中鄕選迨中𡻕至御廉下第槪然有煙霞之志大定戊戌秋丹陽宗師行化西來先生邀於私第事之丹陽日談道妙於是黜妻棄累改衣執弟子禮丹陽訓名大乘號靈陽子日受眞教曲盡妙藴己亥二月十五日丹陽就先生花圃築環與先生同居約百日爲期仍贈之詩云西北亭川環堵居此中堪可隱吾軀眼前碧竹數君子面對青松二大夫流水假山兒戲爾清風明月汝知乎若能悟解予栽韭時宗師環中栽韭以寓意也有分靈光赴玉都丹陽又見花圃中林檎一株久已枯死於四月十四日命移於環內栽之仍作詩云天上三十六地下三十六天地入寶瓶七十二候足後至五月二十日青芽徧吐枯榦復榮丹陽謂大乘曰四月十四乃純陽降世辰也至此日吾之生辰也相去三十六日天地晝夜相合爲七十二候足矣先生作異木記以紀其神刻諸貞石無何丹陽挈先生來終南祖庭居數載之間屢蒙印可壬寅丹陽將東歸長春謂先生曰吾道東矣時館陶劉武節得官鄠邑雅與先生相善官旣滿請先生東游至家築菴奉之劉亦入道爲門弟子厥後道緣日盛門徒雲集又數年先生示微疾順化其體若蟬蛻而輕遠近觀者大加歎異門人具禮葬於菴側關中兵後道眾卽先生華亭環圃大行興建爲太清觀矣先生姓趙氏諱九淵字幾道湛然子其號也世爲隴州隴安縣之右族先生自幼不同兒輩戲狎旣長賦性謹愿平居寡言體貌魁偉襟度灑落習儒業嘗中鄕試之甲科故隴人以解元呼之不事功名每有高蹈遠引之志年逾三十未嘗婚娶大定戊戌秋丹陽宗師演化隴川一時歸嚮者靈集先生見之而心醉曰此吾歸休之地於是設齋炷香請預弟子列丹陽納之明年丹陽還祖庭先生從居之朝叩夕參於道德性命之學大有所得迨壬寅丹陽仙仗東歸先生往來終南鳳隴之間徜徉自若也河內張邦直尹扶風日常延致其家與之談道每留數月爲方外忘形之交先生作文尚平淡詩句雅健得陶謝體每誦老莊黃庭爲日課非法之言略不出口聞人談及他人之短輒瞑目不與之相接但云置論徒敗德招怨躬自厚而薄責於人聖人之遺訓也故所至人皆敬慕之正大末鳳隴兵亂先生負笈深入隴山莫知所終及大元撫治輔正洞眞眞人于君奉旨住持終南祖庭尋訪先生遺文得於隴州祐德觀鄭鍊師子周處目之曰思玄集中統初京兆昊天觀先生門人趙志沖於府城之北特置吉地請翰林待制孟攀鱗作誌起墳葬先生之衣冠以致春秋之祀云先生姓蘇氏名鉉號雲中子華州蒲城人賦性寬慈謙而好禮遇煙霞勝槩終日忘返大定辛卯春詣終南祖庭丹陽宗師席下乞垂開度丹陽置諸左右教以入道儀範服勞旣久未嘗少懈丹陽付授道妙及屢以詩詞接引使進眞功以至心源明了道體沖融一時羽屬皆以小丹陽目之其造道之深可見矣後辭師游海上和光同塵扶宗翊教壬寅夏丹陽東歸復侍几杖迨丹陽之上仙也盤桓登萊之間明昌初長春宗師命先生演教燕薊住崇福觀道緣日興從游者眾一日謂門人曰世緣塵務何時了絕吾其歸矣言訖綵雲繚繞空際枕肱而逝至大元乙巳冬淸和眞人移葬於五華山仙塋眞常眞人奉朝命追贈體元輔教雲中眞人號云先生河東隰州人姓于氏諱通清字泰寧道號眞光子初母夢神人授丹一粒服之有娠洎分瑞之日紅光照室半日方散夙喪其父所居與神霄宫相近先生髫齔之𡻕母氏攜往宫炷香手指道像而問母曰此聖眞者人可得而爲乎母曰唯志於道者可得而近之先生心諾其言自是時詣宮嬉游每見黃冠師誦經必澄坐其側諦聽筵終而去旣長爲人端直不事家產恒有高蹈物表之志但未知所適年幾冠母氏終天葬祭盡禮大定己亥𡻕忽一道者詣門乞食先生飯之因問將安往道者告以將詣終南參師先生乃從其行謁見丹陽宗師於祖庭丹陽問其行止先生具實以吿丹陽留居座下執巾瓶之役數年一日手書立身法付之曰遵是而行仙階可至又屢授眞訣乃得心性圓通後丹陽東歸留先生居祖庭迨明昌辛亥長春亦東還海上先生從居棲霞之太虛觀又數載長春進而前曰聖賢教門方欲開闡汝可分適北京等處弘揚吾道遂授以親翰付畀教法先生承命至霫都環居三載其神光屢見僚庶敦請出環參玄問道者不可勝計莫不虛往而實歸厥後道緣日興度門弟子踰千人唯盧柔和丁至一爲入室僚庶選京城東北隅爽塏之地築華陽觀奉之先生亦自號塗陽隱士大安己巳玉陽眞人仙仗北來館於觀下無何挈先生至燕都保賜紫衣師號自是道價益高門徒愈集貞祐甲戌𡻕蒙長春書召還棲霞之太虛觀俾主觀事興定改元土寇擾攘遷居福山縣杏山村之修眞菴忽然先生集眾告曰今日天氣淸朗北兵寢息吾其歸矣遂沐浴書頌曰今朝推倒無根樹頃刻扳翻鍊藥鑪我獨去時無滯礙杖藜倒曳赴蓬壺擲筆瞑目而逝春秋五十有六時五雲繚繞籠罩菴所竟日不散兵後住持彰德府天慶宫門下法孫李志方遷先生遺蛻葬於府城西北王裕村之仙塋搆堂以奉香火矣先生姓趙名悟玄字子深道號了眞子京兆臨潼人家世業農寄母胎十有二月生於天德元年五月初二日分瑞之際神光滿室親屬相傳莫不爲異旣長志尚清虛不樂世味大定庚寅春丹陽宗師率邱劉譚三友入關道經零口鎮先生見之識其非凡遂邀至家設齋延待旣而與母魏氏並姊弟妻姪六人俱詣終南祖菴投丹陽出家丹陽方急於度人立教俱蒙允納各付以修眞微旨及嗣後屢以法言誘掖皆能爲玄門之達者惟先生侍丹陽最久旣得法之後於劉蔣居環者數年庚子𡻕京兆趙恩舍宅修蓬萊菴請先生居環忻然就請兀坐逾十年爾後邠州淳化縣秦莊道友李氏築環來請先生又往居一紀之𡻕遂得心符至道因折柏四枝插於環中迄今榮茂泰和中咸甯縣樊川𨿅希瑄聞先生爲有道者築環請居之一日房弟𨿅都巡於京兆茶肆內見一道者來乞錢遂手付一文與之而去後月餘還家謁先生於環堵見而驚曰此向日茶肆乞錢道者也問兄先生亦嘗出乎曰無都巡乃焚香拜禮以朱陽村世業柏坡與先生修全道菴永爲棲眞福田先生嘗謂弟子然逸期曰京兆太白廟道祖玄元示迹之地向者丹陽已築堂其側他日必爲崇福道場汝可居之先生亦時往來其中今果爲名觀矣居數載先生復往淳化以大安三年三月十有七日無疾而逝享年六十有三生平暢道詩詞號曰仙梯集行於世度弟子數百人惟王德遇然逸期爲入室後移葬先生於樊川全道菴之柏坡訪平涼同知楊庭秀爲作墓碑以紀其道行天興兵後就全道故址大行興建爲翠微宮矣壬子𡻕眞常眞人炷香祖庭贈以弘玄眞人號先生世居平水法諱光普字明源道號眞陽子幼而聰慧長而豪俠因酒誤傷人肢體避罪入關中偶至終南祖庭聞丹陽宗師談道大有開悟於是焚香拜禮懇祈出家丹陽見許恭執勞役以事左右數年之間漸有得於心一日跪吿師前丹陽教以寡欲澄心摧强挫銳先生旣蒙印可行其所受之學不數載乃得心宇瞻明臻於妙道遂杖筴還河東於稷山縣城之北築了眞菴居環堵自此依歸者眾𡻕壬寅夏忽謂門人曰丹陽宗師將東歸可備香信汝等隨吾往謁卽出環率眾而行甫抵潼關仙仗果至矣丹陽叩其所修先生以所進答之丹陽嘆曰關中已有趙悟玄河東又得段明源吾教得所傳矣先生拜辭而回道價益高三原楊明眞聞之往詣參請多蒙指授仍以物外人詞見贈迨明昌改元二月二十八日先生召門人曰吾有三山
